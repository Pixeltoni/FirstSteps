<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strichmännchen · Prototyp</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
      background: #fafafa;
      color: #0f0f0f;
      font-family: system-ui, sans-serif;
    }
    h1 { font-size: 1.2rem; margin: 0; letter-spacing: -.02em; }
    p.hint { margin: 0; color: #888; font-size: .85rem; }

    .stage {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16 / 9;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }
    canvas { width: 100%; height: 100%; display: block; }

    .controls { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; }
    button {
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: .6rem 1.1rem;
      border: 1px solid #e0e0e0;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    button:hover { border-color: #0f0f0f; }
    button.is-active {
      background: #0f0f0f;
      color: #fff;
      border-color: #0f0f0f;
    }
  </style>
</head>
<body>

  <h1>Strichmännchen · Prototyp</h1>
  <p class="hint">Wähle einen Zustand. Beim <strong>Hovern über die Bühne</strong> wird das Männchen größer und winkt.</p>

  <div class="stage">
    <canvas id="c" width="1280" height="720"></canvas>
  </div>

  <div class="controls">
    <button data-state="idle" class="is-active">Stehen (Front)</button>
    <button data-state="walk">Nach rechts gehen</button>
    <button data-state="wave">Winken (größer)</button>
  </div>

  <script>
  /* ════════════════════════════════════════════════════════
     STRICHMÄNNCHEN  ·  Prototyp
     Ein einfaches, animiertes Strichmännchen auf Canvas.
     Zustände:
       - idle: steht still, Gesicht zur Kamera (Front-Ansicht)
       - walk: läuft im Profil nach rechts über den Bildschirm
       - wave: wird größer und winkt (z. B. beim Hovern)
  ════════════════════════════════════════════════════════ */

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Boden-Linie (auf dieser Höhe stehen die Füße)
  const GROUND = H * 0.82;
  // Größe des Männchens (Beinlänge etc. skalieren hiermit)
  const S = 1.0;

  let current = 'idle';
  let t = 0;            // globale Zeit (Sekunden)
  let walkX = W * 0.18; // horizontale Position beim Gehen
  let last = performance.now();

  // Winken/Vergrößern: Ziel- und aktueller (weich nachziehender) Wert.
  // wave = 0  → normale Größe, kein Winken
  // wave = 1  → vergrößert und winkend
  let waveTarget = 0;
  let wave = 0;
  let hovering = false;
  let staticDrawn = false;  // true, sobald die ruhende Pose einmal gezeichnet wurde

  /* ── Hilfsfunktion: Linie ──────────────────────────────── */
  function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  /* ── Grundstil setzen ──────────────────────────────────── */
  function setStyle() {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 9;
    ctx.strokeStyle = '#0f0f0f';
    ctx.fillStyle = '#0f0f0f';
  }

  /* ════════════════════════════════════════════════════════
     ZUSTAND 1 · STEHEN (Gesicht zur Kamera)
     w = Winke-/Vergrößerungs-Stärke (0..1).
       0 → ruhiges Stehen
       1 → vergrößert, rechter Arm winkt
  ════════════════════════════════════════════════════════ */
  function drawIdle(cx, w) {
    w = w || 0;

    // Skalierung: bei w=1 wächst die Figur auf 135 %.
    // Strichdicke wächst leicht mit, Füße bleiben am Boden.
    const sc = S * (1 + 0.35 * w);
    ctx.lineWidth = 9 * (1 + 0.18 * w);

    // Statische Pose – kein Atmen/Pendeln, damit im Stillstand
    // nichts gerechnet/neu gezeichnet werden muss.
    const headR = 46 * sc;
    const neckY = GROUND - 330 * sc;   // Halsansatz oben
    const hipY  = GROUND - 150 * sc;   // Hüfte
    const footY = GROUND;

    // Kopf
    const headCY = neckY - headR - 6;
    ctx.beginPath();
    ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
    ctx.stroke();

    // Gesicht (zur Kamera): zwei Augen + Lächeln
    ctx.save();
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath(); ctx.arc(cx - 16 * sc, headCY - 6, 5 * sc, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 16 * sc, headCY - 6, 5 * sc, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 5 * sc;
    ctx.beginPath();
    // beim Winken etwas breiteres, freundlicheres Lächeln
    ctx.arc(cx, headCY + 6, (18 + 4 * w) * sc, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
    ctx.restore();
    setStyle();
    ctx.lineWidth = 9 * (1 + 0.18 * w);

    // Rumpf
    line(cx, neckY, cx, hipY);

    const shoulderY = neckY + 24 * sc;
    const upper = 42 * sc;   // Oberarm-Länge
    const fore  = 42 * sc;   // Unterarm-Länge

    // Linker Arm: hängt ruhig nach unten (leicht abgewinkelt)
    {
      const ex = cx - 26 * sc, ey = shoulderY + upper * 0.95;
      const hx = cx - 40 * sc, hy = shoulderY + upper + fore * 0.9;
      line(cx, shoulderY, ex, ey);
      line(ex, ey, hx, hy);
    }

    // Rechter Arm: lerp zwischen Ruhe-Pose (unten) und Winke-Pose (oben).
    // Beide Posen sind als Gelenkpunkte definiert; wir interpolieren mit w.
    {
      // Ruhe-Pose (Arm hängt, Ellbogen leicht gebeugt)
      const restE = { x: cx + 26 * sc, y: shoulderY + upper * 0.95 };
      const restH = { x: cx + 40 * sc, y: shoulderY + upper + fore * 0.9 };

      // Winke-Pose: Oberarm hebt sich seitlich, Ellbogen knickt nach OBEN,
      // Hand oben und wedelt seitlich hin und her.
      const waggle = Math.sin(t * 11) * 16 * sc;          // schnelles Wedeln
      const waveE = { x: cx + 52 * sc, y: shoulderY - 6 * sc };   // Ellbogen seitlich/oben
      const waveH = { x: cx + 60 * sc + waggle, y: shoulderY - 66 * sc }; // Hand hoch

      const ex = restE.x + (waveE.x - restE.x) * w;
      const ey = restE.y + (waveE.y - restE.y) * w;
      const hx = restH.x + (waveH.x - restH.x) * w;
      const hy = restH.y + (waveH.y - restH.y) * w;
      line(cx, shoulderY, ex, ey);   // Oberarm
      line(ex, ey, hx, hy);          // Unterarm + Hand
    }

    // Beine (gerade, leicht gespreizt)
    line(cx, hipY, cx - 42 * sc, footY);   // linkes Bein
    line(cx, hipY, cx + 42 * sc, footY);   // rechtes Bein
  }

  /* ════════════════════════════════════════════════════════
     ZUSTAND 2 · GEHEN NACH RECHTS (Profil)
  ════════════════════════════════════════════════════════ */
  function drawWalk(cx) {
    const speed = 8.5;                     // Geh-Tempo (höher = schnellerer Schritt)
    const phase = t * speed;
    const bob   = Math.abs(Math.cos(phase)) * 12; // Auf-/Ab beim Gehen

    const headR = 46 * S;
    const neckY = GROUND - 330 * S + bob;
    const footY = GROUND;

    // Kopf
    const headCY = neckY - headR - 6;
    ctx.beginPath();
    ctx.arc(cx, headCY, headR, 0, Math.PI * 2);
    ctx.stroke();

    // Gesicht im Profil: ein Auge + Nase nach rechts (Blickrichtung)
    ctx.save();
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath(); ctx.arc(cx + 14, headCY - 6, 5, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 6;
    line(cx + headR - 2, headCY + 4, cx + headR + 12, headCY + 8); // Nase
    ctx.restore();
    setStyle();

    // Rumpf (leicht nach vorn geneigt)
    const leanX = 16 * S;
    const hipX  = cx - leanX;
    const hipY  = GROUND - 150 * S + bob;
    line(cx, neckY, hipX, hipY);

    // Schulter sitzt auf dem (geneigten) Rumpf
    const shoulderX = cx - leanX * 0.18;
    const shoulderY = neckY + 24 * S;

    // ── Arme: gegengleich schwingend, mit Ellbogen-Beugung ──
    const armSeg = 50 * S;  // Ober-/Unterarm
    walkArm(shoulderX, shoulderY,  Math.sin(phase),         armSeg); // vorderer Arm
    walkArm(shoulderX, shoulderY,  Math.sin(phase + Math.PI), armSeg); // hinterer Arm

    // ── Beine: gegengleich, mit Knie-Beugung (Inverse-Kinematik) ──
    const legSeg = (footY - hipY) * 0.52; // Ober-/Unterschenkel
    walkLeg(hipX, hipY, phase,          legSeg, footY); // vorderes Bein
    walkLeg(hipX, hipY, phase + Math.PI, legSeg, footY); // hinteres Bein
  }

  /* Ein Bein über Inverse-Kinematik zeichnen.
     Der Fuß folgt einer Geh-Bahn (vor/zurück + Anheben),
     Knie wird daraus berechnet und beugt nach vorne. */
  function walkLeg(hipX, hipY, phase, seg, footY) {
    const stride = 46 * S;
    const lift   = 30 * S;
    const s = Math.sin(phase);
    // Fußposition relativ zur Hüfte
    const footX = hipX + s * stride;
    // Fuß hebt sich nur in der vorderen (Schwung-)Hälfte
    const fy = footY - Math.max(0, s) * lift;

    const j = ikJoint(hipX, hipY, footX, fy, seg, -1); // Knie nach vorne (+x)
    line(hipX, hipY, j.x, j.y);
    line(j.x, j.y, footX, fy);
  }

  /* Ein Arm mit Ellbogen-Beugung. swing -1..1 steuert das Vorschwingen. */
  function walkArm(sx, sy, swing, seg) {
    const reach = 42 * S;
    // Handziel: schwingt vor/zurück und hebt sich beim Vorschwung leicht
    const handX = sx + swing * reach;
    const handY = sy + seg * 1.55 - Math.abs(swing) * 14 * S;
    const j = ikJoint(sx, sy, handX, handY, seg, +1); // Ellbogen nach hinten (-x)
    line(sx, sy, j.x, j.y);
    line(j.x, j.y, handX, handY);
  }

  /* Zwei-Segment-IK: gegeben Start- und Endpunkt sowie Segmentlänge,
     liefert die Gelenkposition. side (+1/-1) wählt die Beugerichtung. */
  function ikJoint(ax, ay, bx, by, seg, side) {
    const dx = bx - ax, dy = by - ay;
    let d = Math.hypot(dx, dy);
    d = Math.min(d, 2 * seg - 0.001);      // nicht überstrecken
    const a = Math.atan2(dy, dx);          // Richtung Start→Ende
    const bend = Math.acos(d / (2 * seg)); // halber Knickwinkel
    const ang = a + side * bend;
    return { x: ax + Math.cos(ang) * seg, y: ay + Math.sin(ang) * seg };
  }

  /* ════════════════════════════════════════════════════════
     ANIMATIONS-SCHLEIFE
  ════════════════════════════════════════════════════════ */
  function render() {
    ctx.clearRect(0, 0, W, H);

    // Boden andeuten
    ctx.save();
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 3;
    line(0, GROUND, W, GROUND);
    ctx.restore();

    setStyle();

    if (current === 'walk') {
      drawWalk(walkX);
    } else {
      // idle und wave teilen sich die Front-Ansicht;
      // der Winke-/Größen-Wert "wave" steuert den Übergang.
      drawIdle(W / 2, wave);
    }
  }

  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    t += dt;

    // Winke-Ziel bestimmen: aktiv beim Hovern ODER im "wave"-Button-Modus
    waveTarget = (hovering || current === 'wave') ? 1 : 0;
    wave += (waveTarget - wave) * Math.min(1, dt * 8);

    // Bewegt sich nichts? (ruhiges Stehen, Blick zur Kamera)
    // → einmal zeichnen, dann nur noch leerlaufen. Spart Leistung.
    const staticIdle = current === 'idle' && waveTarget === 0 && wave < 0.002;

    if (current === 'walk') {
      // nach rechts bewegen, am Rand wieder von links starten
      walkX += 260 * dt;
      if (walkX > W + 80) walkX = -80;
    }

    if (!staticIdle || !staticDrawn) {
      render();
      staticDrawn = staticIdle;   // im Stillstand merken: ist gezeichnet
    }

    requestAnimationFrame(frame);
  }

  /* ── Buttons ──────────────────────────────────────────── */
  document.querySelectorAll('button[data-state]').forEach(btn => {
    btn.addEventListener('click', () => {
      current = btn.dataset.state;
      if (current === 'walk') walkX = W * 0.18; // beim Start links beginnen
      document.querySelectorAll('button[data-state]')
        .forEach(b => b.classList.toggle('is-active', b === btn));
    });
  });

  /* ── Hover: vergrößern + winken ───────────────────────────
     Beim Hovern über die Bühne wird (außer im Geh-Modus) der
     Winke-/Größen-Effekt ausgelöst. */
  const stage = document.querySelector('.stage');
  stage.addEventListener('mouseenter', () => { hovering = true; });
  stage.addEventListener('mouseleave', () => { hovering = false; });

  requestAnimationFrame(frame);
  </script>

</body>
</html>
