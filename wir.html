<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wir · Charakter erstellen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --sw-black:  #0f0f0f;
      --sw-white:  #ffffff;
      --sw-gray:   #f5f5f5;
      --sw-border: #e0e0e0;
      --sw-muted:  #888888;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--sw-white);
      color: var(--sw-black);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    a { color: inherit; }

    /* ── HEADER ── */
    .wir-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--sw-border);
    }
    .wir-header__logo {
      display: flex; align-items: center; gap: .6rem;
      font-size: .82rem; font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
    }
    .wir-header__logo-box {
      width: 26px; height: 26px;
      border: 2px solid var(--sw-black);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 900; line-height: 1;
    }
    .wir-header__back {
      font-size: .78rem;
      color: var(--sw-muted);
      text-decoration: none;
      letter-spacing: .03em;
    }
    .wir-header__back:hover { color: var(--sw-black); }

    /* ── TITLE BLOCK ── */
    .wir-intro {
      padding: 2.5rem 2.5rem 1.5rem;
      max-width: 640px;
    }
    .wir-intro__label {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--sw-muted);
      margin-bottom: .9rem;
    }
    .wir-intro__title {
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.035em;
      margin: 0 0 .7rem;
    }
    .wir-intro__sub {
      font-size: .9rem;
      color: var(--sw-muted);
      line-height: 1.6;
      margin: 0;
    }

    /* ── LAYOUT ── */
    .wir-studio {
      display: grid;
      grid-template-columns: 42% 58%;
      gap: 2.5rem;
      padding: 1.5rem 2.5rem 4rem;
      align-items: start;
    }

    /* ── PREVIEW (left) ── */
    .wir-stage {
      position: sticky;
      top: 1.5rem;
      background: var(--sw-gray);
      border: 1px solid var(--sw-border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    .wir-stage__avatar {
      width: 100%;
      max-width: 300px;
    }
    .wir-stage__avatar svg { width: 100%; height: auto; display: block; }

    .wir-stage__name {
      width: 100%;
      max-width: 300px;
    }
    .wir-stage__name input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--sw-border);
      background: transparent;
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      padding: .5rem 0;
      outline: none;
      letter-spacing: -.02em;
      color: var(--sw-black);
    }
    .wir-stage__name input:focus { border-color: var(--sw-black); }
    .wir-stage__name input::placeholder { color: var(--sw-muted); font-weight: 600; }

    .wir-stage__actions {
      display: flex;
      gap: .5rem;
      width: 100%;
      max-width: 300px;
    }
    .wir-btn {
      flex: 1;
      padding: .7rem .5rem;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      border: 1px solid var(--sw-border);
      background: var(--sw-white);
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .15s, color .15s, border-color .15s;
    }
    .wir-btn:hover { border-color: var(--sw-black); }
    .wir-btn--primary {
      background: var(--sw-black);
      color: var(--sw-white);
      border-color: var(--sw-black);
    }
    .wir-btn--primary:hover { background: #333; }

    /* ── CONTROLS (right) ── */
    .wir-controls {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .wir-group__title {
      font-size: .68rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--sw-muted);
      margin: 1.75rem 0 .6rem;
    }
    .wir-group:first-child .wir-group__title { margin-top: 0; }

    /* Stepper row: < value > */
    .wir-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .55rem 0;
      border-bottom: 1px solid var(--sw-border);
    }
    .wir-row__label {
      font-size: .9rem;
      font-weight: 600;
      flex-shrink: 0;
      width: 90px;
    }
    .wir-stepper {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex: 1;
      justify-content: flex-end;
    }
    .wir-stepper__btn {
      width: 30px; height: 30px;
      border: 1px solid var(--sw-border);
      background: var(--sw-white);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--sw-black);
      flex-shrink: 0;
    }
    .wir-stepper__btn:hover {
      background: var(--sw-black);
      color: var(--sw-white);
      border-color: var(--sw-black);
    }
    .wir-stepper__value {
      font-size: .85rem;
      color: var(--sw-muted);
      min-width: 96px;
      text-align: center;
    }

    /* Swatch row */
    .wir-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      padding: .35rem 0 .2rem;
    }
    .wir-swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--sw-border);
      cursor: pointer;
      padding: 0;
      transition: transform .1s;
    }
    .wir-swatch:hover { transform: scale(1.1); }
    .wir-swatch.is-active {
      border-color: var(--sw-black);
      box-shadow: 0 0 0 2px var(--sw-white), 0 0 0 4px var(--sw-black);
    }

    .wir-saved-hint {
      font-size: .75rem;
      color: var(--sw-muted);
      text-align: center;
      min-height: 1.1em;
      width: 100%;
      max-width: 300px;
    }

    @media (max-width: 820px) {
      .wir-studio { grid-template-columns: 1fr; padding: 1.5rem 1.5rem 3rem; }
      .wir-stage { position: static; }
      .wir-intro { padding: 2rem 1.5rem 1rem; }
      .wir-header { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

  <header class="wir-header">
    <a href="index.html" class="wir-header__logo">
      <span class="wir-header__logo-box">E</span>
      <span>Erinnerungen</span>
    </a>
    <a href="index.html" class="wir-header__back">&#8249;&nbsp; Zurück</a>
  </header>

  <section class="wir-intro">
    <p class="wir-intro__label">Wir</p>
    <h1 class="wir-intro__title">Erstelle deinen Charakter</h1>
    <p class="wir-intro__sub">Bau dir ein kleines Abbild von dir selbst – Gesicht, Frisur, Farben. Ganz einfach. Dein Charakter wird automatisch in diesem Browser gespeichert.</p>
  </section>

  <main class="wir-studio">

    <!-- PREVIEW -->
    <div class="wir-stage">
      <div class="wir-stage__avatar" id="avatar"></div>
      <div class="wir-stage__name">
        <input type="text" id="charName" placeholder="Name" maxlength="20" />
      </div>
      <div class="wir-stage__actions">
        <button class="wir-btn" type="button" id="btnRandom">Zufall</button>
        <button class="wir-btn" type="button" id="btnReset">Zurücksetzen</button>
        <button class="wir-btn wir-btn--primary" type="button" id="btnSave">Speichern</button>
      </div>
      <div class="wir-saved-hint" id="savedHint"></div>
    </div>

    <!-- CONTROLS -->
    <div class="wir-controls" id="controls"></div>

  </main>

  <script>
  /* ════════════════════════════════════════════════════════
     CHARAKTER-ERSTELLUNG  ·  "Wir"
     Ein simpler, Mii-ähnlicher Avatar-Editor.
     Alles wird als SVG gerendert und im localStorage gesichert.
  ════════════════════════════════════════════════════════ */

  const STORAGE_KEY = 'erinnerungen_charakter';

  /* ── Optionen ───────────────────────────────────────── */
  const SKIN_TONES  = ['#ffe0bd', '#f1c27d', '#e0ac69', '#c68642', '#8d5524', '#5c3a21'];
  const HAIR_COLORS = ['#1a1a1a', '#3b2614', '#6b4423', '#b87333', '#d9a441', '#e8e3da', '#9b3b3b', '#4a6fa5'];
  const SHIRT_COLORS= ['#0f0f0f', '#ffffff', '#9aa0a6', '#c0392b', '#27ae60', '#2980b9', '#f39c12', '#8e44ad'];

  const HAIR_STYLES = ['Glatze', 'Kurz', 'Seite', 'Strubbel', 'Lockig', 'Rund',
                       'Bob', 'Lang', 'Wellig', 'Mittelscheitel', 'Zopf'];
  const EYE_STYLES  = ['Punkte', 'Groß', 'Schmal', 'Müde', 'Zwinkern'];
  const BROW_STYLES = ['Keine', 'Normal', 'Hoch', 'Skeptisch'];
  const NOSE_STYLES = ['Punkt', 'Strich', 'Spitz', 'Keine'];
  const MOUTH_STYLES= ['Lächeln', 'Neutral', 'Grinsen', 'Überrascht', 'Frech'];
  const FACE_SHAPES = ['Rund', 'Oval', 'Eckig'];

  /* ── Standard-Zustand ───────────────────────────────── */
  function defaultState() {
    return {
      name: '',
      skin: 0,
      face: 0,
      hair: 1,
      hairColor: 0,
      eyes: 0,
      brows: 0,
      nose: 0,
      mouth: 0,
      shirt: 0
    };
  }

  let state = defaultState();

  /* ════════════════════════════════════════════════════════
     SVG-RENDERING
  ════════════════════════════════════════════════════════ */

  /* Handgezeichneter Stil:
     - alles als dünne schwarze Strichzeichnung ("ink")
     - Haut & Kleidung nur als zarte Füllung hinter den Linien
     - ein feTurbulence/feDisplacement-Filter gibt allen Pfaden ein
       leichtes "Wackeln", damit es wie mit der Hand gezeichnet wirkt   */
  const INK = '#1f1f1f';

  function faceShape(skin) {
    // Kopf-Umriss je nach Gesichtsform (Füllung Haut, schwarze Kontur)
    switch (FACE_SHAPES[state.face]) {
      case 'Oval':
        return `<ellipse cx="120" cy="116" rx="66" ry="76" fill="${skin}" stroke="${INK}"/>`;
      case 'Eckig':
        return `<rect x="52" y="48" width="136" height="140" rx="40" fill="${skin}" stroke="${INK}"/>`;
      default: // Rund
        return `<circle cx="120" cy="116" r="74" fill="${skin}" stroke="${INK}"/>`;
    }
  }

  function ears(skin) {
    // kleine angedeutete Ohren
    return `
      <path d="M50 112 q-12 2 -9 16 q3 11 13 8" fill="${skin}" stroke="${INK}" stroke-width="2.4"/>
      <path d="M190 112 q12 2 9 16 q-3 11 -13 8" fill="${skin}" stroke="${INK}" stroke-width="2.4"/>`;
  }

  /* Frisuren — volle, gefüllte Haar-Formen mit Volumen.
     Nachgebildet nach der Vorlage: oben kurze, unten lange Stile.
     Jede Form ist eine geschlossene Fläche (Haarfarbe) mit Kontur,
     die oben/seitlich übers Gesicht ragt und die Stirn frei lässt.   */
  function hair(color) {
    const f = `fill="${color}" stroke="${INK}" stroke-width="3"`;
    switch (HAIR_STYLES[state.hair]) {
      case 'Glatze':
        return '';

      case 'Kurz':
        // Kurzer, runder Haarschopf mit kleinem Wirbel
        return `
          <path d="M44 110 C40 60 78 34 120 34 C162 34 200 60 196 110
                   C184 82 156 76 120 78 C86 76 58 82 44 110 Z" ${f}/>
          <path d="M118 36 C128 26 146 28 150 40 C140 36 130 38 124 48 Z" ${f}/>`;

      case 'Seite':
        // Seitenscheitel: Volumen oben, Schwung über die Stirn
        return `<path d="M44 116 C42 56 80 32 122 32 C166 32 198 58 196 114
                  C188 84 168 76 140 80 C158 62 138 52 116 58
                  C142 66 104 96 64 88 C54 96 48 106 44 116 Z" ${f}/>`;

      case 'Strubbel':
        // Strubbelig/struppig: gezackte, abstehende Kontur
        return `<path d="M44 112 L52 70 L66 96 L74 58 L90 90 L102 52 L116 86
                  L126 48 L140 88 L154 56 L168 94 L180 64 L196 112
                  C184 84 156 78 120 80 C86 78 58 84 44 112 Z" ${f}/>`;

      case 'Lockig':
        // Lockig: rundliche Bögen ringsum, viel Volumen
        return `<path d="M42 116
                  a17 17 0 0 1 18 -24 a17 17 0 0 1 24 -14 a16 16 0 0 1 24 -8
                  a16 16 0 0 1 26 0 a16 16 0 0 1 24 8 a17 17 0 0 1 24 14
                  a17 17 0 0 1 18 24
                  C186 90 156 82 120 84 C84 82 56 90 42 116 Z" ${f}/>`;

      case 'Rund':
        // Voller, runder Topf/Pilz-Schnitt
        return `<path d="M40 122 C40 54 80 30 120 30 C160 30 200 54 200 122
                  C192 92 170 82 120 82 C70 82 48 92 40 122 Z" ${f}/>`;

      case 'Bob':
        // Bob bis aufs Kinn, mit Pony
        return `<path d="M46 178 C34 118 36 48 120 34 C204 48 206 118 194 178
                  C190 142 186 106 172 90
                  C176 102 176 114 174 122
                  C172 98 150 84 120 84 C90 84 68 98 66 122
                  C64 114 64 102 68 90
                  C54 106 50 142 46 178 Z" ${f}/>`;

      case 'Lang':
        // Lange, glatte Haare mit Pony, über die Schultern
        return `<path d="M46 258 C30 158 34 52 120 34 C206 52 210 158 194 258
                  C190 200 186 122 172 92
                  C176 104 176 116 174 124
                  C172 100 150 86 120 86 C90 86 68 100 66 124
                  C64 116 64 104 68 92
                  C54 122 50 200 46 258 Z" ${f}/>`;

      case 'Wellig':
        // Lange, wellige Haare (geschwungene Seiten)
        return `<path d="M50 256 C34 216 56 198 44 166 C32 134 54 114 46 84
                  C58 50 88 32 120 34 C152 32 182 50 194 84
                  C186 114 208 134 196 166 C184 198 206 216 190 256
                  C186 206 184 124 172 94
                  C176 106 176 118 174 126
                  C172 102 150 88 120 88 C90 88 68 102 66 126
                  C64 118 64 106 68 94
                  C56 124 54 206 50 256 Z" ${f}/>`;

      case 'Mittelscheitel':
        // Lange Haare mit Mittelscheitel (Stirn frei)
        return `
          <path d="M46 258 C30 158 34 52 120 34 C206 52 210 158 194 258
                   C190 200 184 120 170 90
                   C156 74 138 70 120 72 C102 70 84 74 70 90
                   C56 120 50 200 46 258 Z" ${f}/>
          <path d="M120 36 L120 74" fill="none" stroke="${INK}" stroke-width="2.4"/>`;

      case 'Zopf':
        // Hoher Pferdeschwanz seitlich
        return `
          <path d="M186 70 C214 46 244 52 248 80 C252 106 232 122 212 116
                   C226 104 228 86 214 78 C202 72 192 76 186 88 Z" ${f}/>
          <path d="M48 110 C48 54 84 34 120 34 C156 34 192 54 192 104
                   C182 80 158 74 120 76 C82 74 58 82 48 110 Z" ${f}/>
          <ellipse cx="184" cy="92" rx="9" ry="8" ${f}/>`;

      default:
        return '';
    }
  }

  // Augen — als kleine Punkte/Striche im Doodle-Stil
  function eyes() {
    const lx = 96, rx = 144, y = 122;
    switch (EYE_STYLES[state.eyes]) {
      case 'Groß':
        return `
          <circle cx="${lx}" cy="${y}" r="10" fill="#fff" stroke="${INK}" stroke-width="2.6"/>
          <circle cx="${rx}" cy="${y}" r="10" fill="#fff" stroke="${INK}" stroke-width="2.6"/>
          <circle cx="${lx}" cy="${y+1}" r="4.5" fill="${INK}" stroke="none"/>
          <circle cx="${rx}" cy="${y+1}" r="4.5" fill="${INK}" stroke="none"/>`;
      case 'Schmal':
        return `
          <path d="M${lx-9} ${y} q9 -6 18 0"/>
          <path d="M${rx-9} ${y} q9 -6 18 0"/>`;
      case 'Müde':
        return `
          <path d="M${lx-9} ${y-2} q9 8 18 0"/>
          <path d="M${rx-9} ${y-2} q9 8 18 0"/>`;
      case 'Zwinkern':
        return `
          <path d="M${lx-9} ${y} q9 7 18 0"/>
          <circle cx="${rx}" cy="${y}" r="4.5" fill="${INK}" stroke="none"/>`;
      default: // Punkte
        return `
          <circle cx="${lx}" cy="${y}" r="4.5" fill="${INK}" stroke="none"/>
          <circle cx="${rx}" cy="${y}" r="4.5" fill="${INK}" stroke="none"/>`;
    }
  }

  function brows(color) {
    const lx = 96, rx = 144, y = 102;
    switch (BROW_STYLES[state.brows]) {
      case 'Normal':
        return `
          <path d="M${lx-11} ${y} q11 -5 22 0" stroke="${color}" stroke-width="2.8"/>
          <path d="M${rx-11} ${y} q11 -5 22 0" stroke="${color}" stroke-width="2.8"/>`;
      case 'Hoch':
        return `
          <path d="M${lx-11} ${y-5} q11 -5 22 0" stroke="${color}" stroke-width="2.8"/>
          <path d="M${rx-11} ${y-5} q11 -5 22 0" stroke="${color}" stroke-width="2.8"/>`;
      case 'Skeptisch':
        return `
          <path d="M${lx-11} ${y-3} q11 -2 22 4" stroke="${color}" stroke-width="2.8"/>
          <path d="M${rx-11} ${y+2} q11 -6 22 -2" stroke="${color}" stroke-width="2.8"/>`;
      default: // Keine
        return '';
    }
  }

  function nose() {
    const cx = 120, y = 138;
    switch (NOSE_STYLES[state.nose]) {
      case 'Strich':
        return `<path d="M${cx} ${y-8} L${cx} ${y+4}" stroke-width="2.4"/>`;
      case 'Spitz':
        return `<path d="M${cx+5} ${y-8} L${cx-4} ${y+5} L${cx+5} ${y+5}" stroke-width="2.4"/>`;
      case 'Keine':
        return '';
      default: // Punkt
        return `<circle cx="${cx}" cy="${y}" r="2.6" fill="${INK}" stroke="none"/>`;
    }
  }

  function mouth() {
    const cx = 120, y = 162;
    switch (MOUTH_STYLES[state.mouth]) {
      case 'Neutral':
        return `<path d="M${cx-13} ${y} L${cx+13} ${y}"/>`;
      case 'Grinsen':
        return `<path d="M${cx-18} ${y-3} q18 20 36 0 q-18 5 -36 0 Z" fill="#fff"/>`;
      case 'Überrascht':
        return `<circle cx="${cx}" cy="${y+1}" r="8" fill="#fff"/>`;
      case 'Frech':
        return `
          <path d="M${cx-15} ${y} q15 14 30 0"/>
          <path d="M${cx-1} ${y+2} L${cx+11} ${y+2}" stroke-width="2"/>`;
      default: // Lächeln
        return `<path d="M${cx-16} ${y-2} q16 18 32 0"/>`;
    }
  }

  function body(skin, shirtColor) {
    // Kleiner Körper unter dem Kopf, im selben Strich-Stil
    return `
      <path d="M108 188 q12 10 24 0" fill="${skin}" stroke="${INK}" stroke-width="2.4"/>
      <path d="M120 206
               C96 206 78 220 72 248
               L72 296 L168 296 L168 248
               C162 220 144 206 120 206 Z"
            fill="${shirtColor}" stroke="${INK}"/>`;
  }

  function renderAvatar() {
    const skin  = SKIN_TONES[state.skin];
    const hairC = HAIR_COLORS[state.hairColor];
    const shirt = SHIRT_COLORS[state.shirt];

    // Leichtes Zufalls-"Zittern" pro Render für den Handzeichnungs-Look
    const seed = (state.face + state.hair * 3 + state.eyes + state.mouth) % 90;

    const svg = `
      <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charakter-Vorschau">
        <defs>
          <filter id="sketch" x="-8%" y="-8%" width="116%" height="116%">
            <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="${seed}" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="2.6"/>
          </filter>
        </defs>
        <g filter="url(#sketch)"
           fill="none" stroke="${INK}" stroke-width="3"
           stroke-linecap="round" stroke-linejoin="round">
          ${body(skin, shirt)}
          ${ears(skin)}
          ${faceShape(skin)}
          ${hair(hairC)}
          ${brows(hairC)}
          ${eyes()}
          ${nose()}
          ${mouth()}
        </g>
      </svg>`;
    document.getElementById('avatar').innerHTML = svg;
  }

  /* ════════════════════════════════════════════════════════
     STEUERELEMENTE
  ════════════════════════════════════════════════════════ */

  // Stepper-Definitionen: zyklische Auswahl
  const STEPPERS = [
    { group: 'Gesicht', label: 'Form',    key: 'face',  options: FACE_SHAPES },
    { group: 'Gesicht', label: 'Augen',   key: 'eyes',  options: EYE_STYLES },
    { group: 'Gesicht', label: 'Brauen',  key: 'brows', options: BROW_STYLES },
    { group: 'Gesicht', label: 'Nase',    key: 'nose',  options: NOSE_STYLES },
    { group: 'Gesicht', label: 'Mund',    key: 'mouth', options: MOUTH_STYLES },
    { group: 'Haare',   label: 'Frisur',  key: 'hair',  options: HAIR_STYLES }
  ];

  // Farb-Definitionen
  const SWATCHES = [
    { group: 'Hautton',     key: 'skin',      colors: SKIN_TONES },
    { group: 'Haarfarbe',   key: 'hairColor', colors: HAIR_COLORS },
    { group: 'Kleidung',    key: 'shirt',     colors: SHIRT_COLORS }
  ];

  function buildControls() {
    const root = document.getElementById('controls');
    root.innerHTML = '';

    // Gruppiere Stepper nach "group"
    const groups = {};
    STEPPERS.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });

    // Stepper-Gruppen
    Object.keys(groups).forEach(groupName => {
      const g = document.createElement('div');
      g.className = 'wir-group';
      g.innerHTML = `<div class="wir-group__title">${groupName}</div>`;
      groups[groupName].forEach(s => {
        const row = document.createElement('div');
        row.className = 'wir-row';
        row.innerHTML = `
          <span class="wir-row__label">${s.label}</span>
          <div class="wir-stepper">
            <button class="wir-stepper__btn" type="button" data-dir="-1">&#8249;</button>
            <span class="wir-stepper__value" data-val="${s.key}">${s.options[state[s.key]]}</span>
            <button class="wir-stepper__btn" type="button" data-dir="1">&#8250;</button>
          </div>`;
        row.querySelectorAll('.wir-stepper__btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = parseInt(btn.dataset.dir, 10);
            state[s.key] = (state[s.key] + dir + s.options.length) % s.options.length;
            row.querySelector('[data-val]').textContent = s.options[state[s.key]];
            renderAvatar();
          });
        });
        g.appendChild(row);
      });
      root.appendChild(g);
    });

    // Farb-Gruppen
    SWATCHES.forEach(sw => {
      const g = document.createElement('div');
      g.className = 'wir-group';
      g.innerHTML = `<div class="wir-group__title">${sw.group}</div>`;
      const wrap = document.createElement('div');
      wrap.className = 'wir-swatches';
      sw.colors.forEach((col, i) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'wir-swatch' + (state[sw.key] === i ? ' is-active' : '');
        b.style.background = col;
        b.setAttribute('aria-label', sw.group + ' ' + (i + 1));
        b.addEventListener('click', () => {
          state[sw.key] = i;
          wrap.querySelectorAll('.wir-swatch').forEach(x => x.classList.remove('is-active'));
          b.classList.add('is-active');
          renderAvatar();
        });
        wrap.appendChild(b);
      });
      g.appendChild(wrap);
      root.appendChild(g);
    });
  }

  /* ════════════════════════════════════════════════════════
     SPEICHERN / LADEN / AKTIONEN
  ════════════════════════════════════════════════════════ */

  const nameInput = document.getElementById('charName');
  const savedHint = document.getElementById('savedHint');

  function syncUI() {
    nameInput.value = state.name || '';
    buildControls();
    renderAvatar();
  }

  function save() {
    state.name = nameInput.value.trim();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashHint('Gespeichert ✓');
    } catch (e) {
      flashHint('Speichern nicht möglich');
    }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        state = Object.assign(defaultState(), saved);
      }
    } catch (e) { /* ignoriere defekte Daten */ }
  }

  let hintTimer = null;
  function flashHint(msg) {
    savedHint.textContent = msg;
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => { savedHint.textContent = ''; }, 2200);
  }

  function randomize() {
    state.face      = Math.floor(Math.random() * FACE_SHAPES.length);
    state.skin      = Math.floor(Math.random() * SKIN_TONES.length);
    state.hair      = Math.floor(Math.random() * HAIR_STYLES.length);
    state.hairColor = Math.floor(Math.random() * HAIR_COLORS.length);
    state.eyes      = Math.floor(Math.random() * EYE_STYLES.length);
    state.brows     = Math.floor(Math.random() * BROW_STYLES.length);
    state.nose      = Math.floor(Math.random() * NOSE_STYLES.length);
    state.mouth     = Math.floor(Math.random() * MOUTH_STYLES.length);
    state.shirt     = Math.floor(Math.random() * SHIRT_COLORS.length);
    syncUI();
  }

  function reset() {
    const name = nameInput.value;
    state = defaultState();
    state.name = name;
    syncUI();
  }

  document.getElementById('btnSave').addEventListener('click', save);
  document.getElementById('btnRandom').addEventListener('click', randomize);
  document.getElementById('btnReset').addEventListener('click', reset);

  /* ── Start ── */
  load();
  syncUI();
  </script>

</body>
</html>
