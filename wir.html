<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wir · Charakter erstellen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --sw-black:  #0f0f0f;
      --sw-white:  #ffffff;
      --sw-gray:   #f5f5f5;
      --sw-border: #e0e0e0;
      --sw-muted:  #888888;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--sw-white);
      color: var(--sw-black);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    a { color: inherit; }

    /* ── HEADER ── */
    .wir-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--sw-border);
    }
    .wir-header__logo {
      display: flex; align-items: center; gap: .6rem;
      font-size: .82rem; font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
    }
    .wir-header__logo-box {
      width: 26px; height: 26px;
      border: 2px solid var(--sw-black);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 900; line-height: 1;
    }
    .wir-header__back {
      font-size: .78rem;
      color: var(--sw-muted);
      text-decoration: none;
      letter-spacing: .03em;
    }
    .wir-header__back:hover { color: var(--sw-black); }

    /* ── TITLE BLOCK ── */
    .wir-intro {
      padding: 2.5rem 2.5rem 1.5rem;
      max-width: 640px;
    }
    .wir-intro__label {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--sw-muted);
      margin-bottom: .9rem;
    }
    .wir-intro__title {
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.035em;
      margin: 0 0 .7rem;
    }
    .wir-intro__sub {
      font-size: .9rem;
      color: var(--sw-muted);
      line-height: 1.6;
      margin: 0;
    }

    /* ── LAYOUT ── */
    .wir-studio {
      display: grid;
      grid-template-columns: 42% 58%;
      gap: 2.5rem;
      padding: 1.5rem 2.5rem 4rem;
      align-items: start;
    }

    /* ── PREVIEW (left) ── */
    .wir-stage {
      position: sticky;
      top: 1.5rem;
      background: var(--sw-gray);
      border: 1px solid var(--sw-border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    .wir-stage__avatar {
      width: 100%;
      max-width: 300px;
    }
    .wir-stage__avatar svg { width: 100%; height: auto; display: block; }

    .wir-stage__name {
      width: 100%;
      max-width: 300px;
    }
    .wir-stage__name input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--sw-border);
      background: transparent;
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      padding: .5rem 0;
      outline: none;
      letter-spacing: -.02em;
      color: var(--sw-black);
    }
    .wir-stage__name input:focus { border-color: var(--sw-black); }
    .wir-stage__name input::placeholder { color: var(--sw-muted); font-weight: 600; }

    .wir-stage__actions {
      display: flex;
      gap: .5rem;
      width: 100%;
      max-width: 300px;
    }
    .wir-btn {
      flex: 1;
      padding: .7rem .5rem;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      border: 1px solid var(--sw-border);
      background: var(--sw-white);
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .15s, color .15s, border-color .15s;
    }
    .wir-btn:hover { border-color: var(--sw-black); }
    .wir-btn--primary {
      background: var(--sw-black);
      color: var(--sw-white);
      border-color: var(--sw-black);
    }
    .wir-btn--primary:hover { background: #333; }

    /* ── CONTROLS (right) ── */
    .wir-controls {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .wir-group__title {
      font-size: .68rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--sw-muted);
      margin: 1.75rem 0 .6rem;
    }
    .wir-group:first-child .wir-group__title { margin-top: 0; }

    /* Stepper row: < value > */
    .wir-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .55rem 0;
      border-bottom: 1px solid var(--sw-border);
    }
    .wir-row__label {
      font-size: .9rem;
      font-weight: 600;
      flex-shrink: 0;
      width: 90px;
    }
    .wir-stepper {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex: 1;
      justify-content: flex-end;
    }
    .wir-stepper__btn {
      width: 30px; height: 30px;
      border: 1px solid var(--sw-border);
      background: var(--sw-white);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--sw-black);
      flex-shrink: 0;
    }
    .wir-stepper__btn:hover {
      background: var(--sw-black);
      color: var(--sw-white);
      border-color: var(--sw-black);
    }
    .wir-stepper__value {
      font-size: .85rem;
      color: var(--sw-muted);
      min-width: 96px;
      text-align: center;
    }

    /* Swatch row */
    .wir-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      padding: .35rem 0 .2rem;
    }
    .wir-swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--sw-border);
      cursor: pointer;
      padding: 0;
      transition: transform .1s;
    }
    .wir-swatch:hover { transform: scale(1.1); }
    .wir-swatch.is-active {
      border-color: var(--sw-black);
      box-shadow: 0 0 0 2px var(--sw-white), 0 0 0 4px var(--sw-black);
    }

    .wir-saved-hint {
      font-size: .75rem;
      color: var(--sw-muted);
      text-align: center;
      min-height: 1.1em;
      width: 100%;
      max-width: 300px;
    }

    @media (max-width: 820px) {
      .wir-studio { grid-template-columns: 1fr; padding: 1.5rem 1.5rem 3rem; }
      .wir-stage { position: static; }
      .wir-intro { padding: 2rem 1.5rem 1rem; }
      .wir-header { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

  <header class="wir-header">
    <a href="index.html" class="wir-header__logo">
      <span class="wir-header__logo-box">E</span>
      <span>Erinnerungen</span>
    </a>
    <a href="index.html" class="wir-header__back">&#8249;&nbsp; Zurück</a>
  </header>

  <section class="wir-intro">
    <p class="wir-intro__label">Wir</p>
    <h1 class="wir-intro__title">Erstelle deinen Charakter</h1>
    <p class="wir-intro__sub">Bau dir ein kleines Abbild von dir selbst – Gesicht, Frisur, Farben. Ganz einfach. Dein Charakter wird automatisch in diesem Browser gespeichert.</p>
  </section>

  <main class="wir-studio">

    <!-- PREVIEW -->
    <div class="wir-stage">
      <div class="wir-stage__avatar" id="avatar"></div>
      <div class="wir-stage__name">
        <input type="text" id="charName" placeholder="Name" maxlength="20" />
      </div>
      <div class="wir-stage__actions">
        <button class="wir-btn" type="button" id="btnRandom">Zufall</button>
        <button class="wir-btn" type="button" id="btnReset">Zurücksetzen</button>
        <button class="wir-btn wir-btn--primary" type="button" id="btnSave">Speichern</button>
      </div>
      <div class="wir-saved-hint" id="savedHint"></div>
    </div>

    <!-- CONTROLS -->
    <div class="wir-controls" id="controls"></div>

  </main>

  <script>
  /* ════════════════════════════════════════════════════════
     CHARAKTER-ERSTELLUNG  ·  "Wir"
     Ein simpler, Mii-ähnlicher Avatar-Editor.
     Alles wird als SVG gerendert und im localStorage gesichert.
  ════════════════════════════════════════════════════════ */

  const STORAGE_KEY = 'erinnerungen_charakter';

  /* ── Optionen ───────────────────────────────────────── */
  const SKIN_TONES  = ['#ffe0bd', '#f1c27d', '#e0ac69', '#c68642', '#8d5524', '#5c3a21'];
  const HAIR_COLORS = ['#1a1a1a', '#3b2614', '#6b4423', '#b87333', '#d9a441', '#e8e3da', '#9b3b3b', '#4a6fa5'];
  const SHIRT_COLORS= ['#0f0f0f', '#ffffff', '#9aa0a6', '#c0392b', '#27ae60', '#2980b9', '#f39c12', '#8e44ad'];

  const HAIR_STYLES = ['Glatze', 'Kurz', 'Seite', 'Lang', 'Locken', 'Dutt', 'Pony'];
  const EYE_STYLES  = ['Normal', 'Groß', 'Schmal', 'Müde', 'Zwinkern'];
  const BROW_STYLES = ['Normal', 'Hoch', 'Dick', 'Skeptisch'];
  const NOSE_STYLES = ['Klein', 'Rund', 'Spitz'];
  const MOUTH_STYLES= ['Lächeln', 'Neutral', 'Grinsen', 'Überrascht', 'Frech'];
  const FACE_SHAPES = ['Oval', 'Rund', 'Eckig'];

  /* ── Standard-Zustand ───────────────────────────────── */
  function defaultState() {
    return {
      name: '',
      skin: 1,
      face: 0,
      hair: 1,
      hairColor: 0,
      eyes: 0,
      brows: 0,
      nose: 0,
      mouth: 0,
      shirt: 0
    };
  }

  let state = defaultState();

  /* ════════════════════════════════════════════════════════
     SVG-RENDERING
  ════════════════════════════════════════════════════════ */

  function faceShape(skin) {
    // Kopf-Pfad je nach Gesichtsform
    switch (FACE_SHAPES[state.face]) {
      case 'Rund':
        return `<circle cx="120" cy="120" r="74" fill="${skin}"/>`;
      case 'Eckig':
        return `<rect x="48" y="48" width="144" height="150" rx="34" fill="${skin}"/>`;
      default: // Oval
        return `<ellipse cx="120" cy="122" rx="70" ry="80" fill="${skin}"/>`;
    }
  }

  function ears(skin) {
    return `
      <ellipse cx="52" cy="128" rx="13" ry="18" fill="${skin}"/>
      <ellipse cx="188" cy="128" rx="13" ry="18" fill="${skin}"/>`;
  }

  function hair(color) {
    switch (HAIR_STYLES[state.hair]) {
      case 'Glatze':
        return '';
      case 'Kurz':
        return `<path d="M48 116 C50 58 80 40 120 40 C160 40 190 58 192 116 C192 96 175 80 120 80 C65 80 48 96 48 116 Z" fill="${color}"/>`;
      case 'Seite':
        return `<path d="M48 118 C48 56 82 40 120 40 C162 40 192 60 192 118 C188 92 170 78 130 78 C150 70 96 60 78 92 C70 104 60 110 48 118 Z" fill="${color}"/>`;
      case 'Lang':
        return `<path d="M44 200 C36 120 44 44 120 44 C196 44 204 120 196 200 C188 196 182 150 178 120 C178 92 160 78 120 78 C80 78 62 92 62 120 C58 150 52 196 44 200 Z" fill="${color}"/>`;
      case 'Locken':
        return `<g fill="${color}">
          <circle cx="70" cy="62" r="24"/><circle cx="104" cy="50" r="26"/>
          <circle cx="138" cy="50" r="26"/><circle cx="172" cy="64" r="24"/>
          <circle cx="56" cy="92" r="22"/><circle cx="186" cy="92" r="22"/>
          <path d="M52 110 C52 70 84 56 120 56 C156 56 190 70 190 110 C180 88 160 80 120 80 C80 80 60 88 52 110 Z"/>
        </g>`;
      case 'Dutt':
        return `<g fill="${color}">
          <circle cx="120" cy="34" r="20"/>
          <path d="M50 116 C52 60 82 42 120 42 C158 42 190 60 192 116 C188 92 170 80 120 80 C70 80 54 96 50 116 Z"/>
        </g>`;
      case 'Pony':
        return `<path d="M48 118 C48 54 84 40 120 40 C158 40 192 56 192 118 C192 100 184 86 168 84 C176 96 170 108 158 108 C150 92 138 86 120 86 C102 86 90 92 82 108 C70 108 64 96 72 84 C56 86 48 100 48 118 Z" fill="${color}"/>`;
      default:
        return '';
    }
  }

  function eyes() {
    const lx = 92, rx = 148, y = 124;
    switch (EYE_STYLES[state.eyes]) {
      case 'Groß':
        return `
          <circle cx="${lx}" cy="${y}" r="13" fill="#fff" stroke="#0f0f0f" stroke-width="2.5"/>
          <circle cx="${rx}" cy="${y}" r="13" fill="#fff" stroke="#0f0f0f" stroke-width="2.5"/>
          <circle cx="${lx}" cy="${y+1}" r="6" fill="#1a1a1a"/>
          <circle cx="${rx}" cy="${y+1}" r="6" fill="#1a1a1a"/>`;
      case 'Schmal':
        return `
          <path d="M${lx-12} ${y} q12 -8 24 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>
          <path d="M${rx-12} ${y} q12 -8 24 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>
          <circle cx="${lx}" cy="${y-1}" r="3.5" fill="#1a1a1a"/>
          <circle cx="${rx}" cy="${y-1}" r="3.5" fill="#1a1a1a"/>`;
      case 'Müde':
        return `
          <path d="M${lx-11} ${y-2} q11 9 22 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>
          <path d="M${rx-11} ${y-2} q11 9 22 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>`;
      case 'Zwinkern':
        return `
          <path d="M${lx-11} ${y} q11 7 22 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>
          <circle cx="${rx}" cy="${y}" r="9" fill="#fff" stroke="#0f0f0f" stroke-width="2.5"/>
          <circle cx="${rx}" cy="${y+1}" r="4.5" fill="#1a1a1a"/>`;
      default: // Normal
        return `
          <ellipse cx="${lx}" cy="${y}" rx="9" ry="10" fill="#fff" stroke="#0f0f0f" stroke-width="2.5"/>
          <ellipse cx="${rx}" cy="${y}" rx="9" ry="10" fill="#fff" stroke="#0f0f0f" stroke-width="2.5"/>
          <circle cx="${lx}" cy="${y+1}" r="4.5" fill="#1a1a1a"/>
          <circle cx="${rx}" cy="${y+1}" r="4.5" fill="#1a1a1a"/>`;
    }
  }

  function brows(color) {
    const lx = 92, rx = 148, y = 104;
    switch (BROW_STYLES[state.brows]) {
      case 'Hoch':
        return `
          <path d="M${lx-12} ${y-6} q12 -6 24 0" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M${rx-12} ${y-6} q12 -6 24 0" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round"/>`;
      case 'Dick':
        return `
          <path d="M${lx-13} ${y} q13 -7 26 0" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>
          <path d="M${rx-13} ${y} q13 -7 26 0" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>`;
      case 'Skeptisch':
        return `
          <path d="M${lx-12} ${y-4} q12 -3 24 4" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M${rx-12} ${y+1} q12 -7 24 -2" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round"/>`;
      default: // Normal
        return `
          <path d="M${lx-12} ${y} q12 -5 24 0" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
          <path d="M${rx-12} ${y} q12 -5 24 0" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>`;
    }
  }

  function nose(skin) {
    const cx = 120, y = 144;
    switch (NOSE_STYLES[state.nose]) {
      case 'Rund':
        return `<circle cx="${cx}" cy="${y+4}" r="8" fill="rgba(0,0,0,.10)"/>`;
      case 'Spitz':
        return `<path d="M${cx} ${y-10} L${cx-7} ${y+8} L${cx+7} ${y+8} Z" fill="rgba(0,0,0,.12)"/>`;
      default: // Klein
        return `<path d="M${cx-5} ${y} q5 8 10 0" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="2.5" stroke-linecap="round"/>`;
    }
  }

  function mouth() {
    const cx = 120, y = 168;
    switch (MOUTH_STYLES[state.mouth]) {
      case 'Neutral':
        return `<line x1="${cx-16}" y1="${y}" x2="${cx+16}" y2="${y}" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>`;
      case 'Grinsen':
        return `<path d="M${cx-22} ${y-4} q22 26 44 0 q-22 8 -44 0 Z" fill="#fff" stroke="#0f0f0f" stroke-width="3" stroke-linejoin="round"/>`;
      case 'Überrascht':
        return `<ellipse cx="${cx}" cy="${y+2}" rx="10" ry="13" fill="#7a2e2e" stroke="#0f0f0f" stroke-width="2.5"/>`;
      case 'Frech':
        return `<path d="M${cx-18} ${y} q18 16 36 0" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round"/>
                <line x1="${cx-2}" y1="${y+2}" x2="${cx+14}" y2="${y+2}" stroke="#0f0f0f" stroke-width="2"/>`;
      default: // Lächeln
        return `<path d="M${cx-20} ${y-2} q20 22 40 0" fill="none" stroke="#0f0f0f" stroke-width="3.5" stroke-linecap="round"/>`;
    }
  }

  function body(skin, shirtColor) {
    // Kleiner Körper unter dem Kopf
    const shirtStroke = (SHIRT_COLORS[state.shirt] === '#ffffff') ? '#0f0f0f' : 'none';
    return `
      <!-- Hals -->
      <rect x="106" y="190" width="28" height="26" rx="8" fill="${skin}"/>
      <!-- Schultern / Oberkörper -->
      <path d="M120 210
               C92 210 72 226 66 256
               L66 300 L174 300 L174 256
               C168 226 148 210 120 210 Z"
            fill="${shirtColor}" stroke="${shirtStroke}" stroke-width="2"/>`;
  }

  function renderAvatar() {
    const skin  = SKIN_TONES[state.skin];
    const hairC = HAIR_COLORS[state.hairColor];
    const shirt = SHIRT_COLORS[state.shirt];

    const svg = `
      <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charakter-Vorschau">
        ${body(skin, shirt)}
        ${ears(skin)}
        ${faceShape(skin)}
        ${hair(hairC)}
        ${brows(hairC)}
        ${eyes()}
        ${nose(skin)}
        ${mouth()}
      </svg>`;
    document.getElementById('avatar').innerHTML = svg;
  }

  /* ════════════════════════════════════════════════════════
     STEUERELEMENTE
  ════════════════════════════════════════════════════════ */

  // Stepper-Definitionen: zyklische Auswahl
  const STEPPERS = [
    { group: 'Gesicht', label: 'Form',    key: 'face',  options: FACE_SHAPES },
    { group: 'Gesicht', label: 'Augen',   key: 'eyes',  options: EYE_STYLES },
    { group: 'Gesicht', label: 'Brauen',  key: 'brows', options: BROW_STYLES },
    { group: 'Gesicht', label: 'Nase',    key: 'nose',  options: NOSE_STYLES },
    { group: 'Gesicht', label: 'Mund',    key: 'mouth', options: MOUTH_STYLES },
    { group: 'Haare',   label: 'Frisur',  key: 'hair',  options: HAIR_STYLES }
  ];

  // Farb-Definitionen
  const SWATCHES = [
    { group: 'Hautton',     key: 'skin',      colors: SKIN_TONES },
    { group: 'Haarfarbe',   key: 'hairColor', colors: HAIR_COLORS },
    { group: 'Kleidung',    key: 'shirt',     colors: SHIRT_COLORS }
  ];

  function buildControls() {
    const root = document.getElementById('controls');
    root.innerHTML = '';

    // Gruppiere Stepper nach "group"
    const groups = {};
    STEPPERS.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });

    // Stepper-Gruppen
    Object.keys(groups).forEach(groupName => {
      const g = document.createElement('div');
      g.className = 'wir-group';
      g.innerHTML = `<div class="wir-group__title">${groupName}</div>`;
      groups[groupName].forEach(s => {
        const row = document.createElement('div');
        row.className = 'wir-row';
        row.innerHTML = `
          <span class="wir-row__label">${s.label}</span>
          <div class="wir-stepper">
            <button class="wir-stepper__btn" type="button" data-dir="-1">&#8249;</button>
            <span class="wir-stepper__value" data-val="${s.key}">${s.options[state[s.key]]}</span>
            <button class="wir-stepper__btn" type="button" data-dir="1">&#8250;</button>
          </div>`;
        row.querySelectorAll('.wir-stepper__btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = parseInt(btn.dataset.dir, 10);
            state[s.key] = (state[s.key] + dir + s.options.length) % s.options.length;
            row.querySelector('[data-val]').textContent = s.options[state[s.key]];
            renderAvatar();
          });
        });
        g.appendChild(row);
      });
      root.appendChild(g);
    });

    // Farb-Gruppen
    SWATCHES.forEach(sw => {
      const g = document.createElement('div');
      g.className = 'wir-group';
      g.innerHTML = `<div class="wir-group__title">${sw.group}</div>`;
      const wrap = document.createElement('div');
      wrap.className = 'wir-swatches';
      sw.colors.forEach((col, i) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'wir-swatch' + (state[sw.key] === i ? ' is-active' : '');
        b.style.background = col;
        b.setAttribute('aria-label', sw.group + ' ' + (i + 1));
        b.addEventListener('click', () => {
          state[sw.key] = i;
          wrap.querySelectorAll('.wir-swatch').forEach(x => x.classList.remove('is-active'));
          b.classList.add('is-active');
          renderAvatar();
        });
        wrap.appendChild(b);
      });
      g.appendChild(wrap);
      root.appendChild(g);
    });
  }

  /* ════════════════════════════════════════════════════════
     SPEICHERN / LADEN / AKTIONEN
  ════════════════════════════════════════════════════════ */

  const nameInput = document.getElementById('charName');
  const savedHint = document.getElementById('savedHint');

  function syncUI() {
    nameInput.value = state.name || '';
    buildControls();
    renderAvatar();
  }

  function save() {
    state.name = nameInput.value.trim();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashHint('Gespeichert ✓');
    } catch (e) {
      flashHint('Speichern nicht möglich');
    }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        state = Object.assign(defaultState(), saved);
      }
    } catch (e) { /* ignoriere defekte Daten */ }
  }

  let hintTimer = null;
  function flashHint(msg) {
    savedHint.textContent = msg;
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => { savedHint.textContent = ''; }, 2200);
  }

  function randomize() {
    state.face      = Math.floor(Math.random() * FACE_SHAPES.length);
    state.skin      = Math.floor(Math.random() * SKIN_TONES.length);
    state.hair      = Math.floor(Math.random() * HAIR_STYLES.length);
    state.hairColor = Math.floor(Math.random() * HAIR_COLORS.length);
    state.eyes      = Math.floor(Math.random() * EYE_STYLES.length);
    state.brows     = Math.floor(Math.random() * BROW_STYLES.length);
    state.nose      = Math.floor(Math.random() * NOSE_STYLES.length);
    state.mouth     = Math.floor(Math.random() * MOUTH_STYLES.length);
    state.shirt     = Math.floor(Math.random() * SHIRT_COLORS.length);
    syncUI();
  }

  function reset() {
    const name = nameInput.value;
    state = defaultState();
    state.name = name;
    syncUI();
  }

  document.getElementById('btnSave').addEventListener('click', save);
  document.getElementById('btnRandom').addEventListener('click', randomize);
  document.getElementById('btnReset').addEventListener('click', reset);

  /* ── Start ── */
  load();
  syncUI();
  </script>

</body>
</html>
