<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wir · Charakter erstellen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --sw-black:  #0f0f0f;
      --sw-white:  #ffffff;
      --sw-gray:   #f5f5f5;
      --sw-border: #e0e0e0;
      --sw-muted:  #888888;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--sw-white);
      color: var(--sw-black);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    a { color: inherit; }

    /* ── HEADER ── */
    .wir-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--sw-border);
    }
    .wir-header__logo {
      display: flex; align-items: center; gap: .6rem;
      font-size: .82rem; font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
    }
    .wir-header__logo-box {
      width: 26px; height: 26px;
      border: 2px solid var(--sw-black);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 900; line-height: 1;
    }
    .wir-header__back {
      font-size: .78rem;
      color: var(--sw-muted);
      text-decoration: none;
      letter-spacing: .03em;
    }
    .wir-header__back:hover { color: var(--sw-black); }
  </style>
</head>
<body>

  <header class="wir-header">
    <a href="index.html" class="wir-header__logo">
      <span class="wir-header__logo-box">E</span>
      <span>Erinnerungen</span>
    </a>
    <a href="index.html" class="wir-header__back">&#8249;&nbsp; Zurück</a>
  </header>

  <!-- Charakter-Erstellung wird hier neu aufgebaut -->

</body>
</html>
