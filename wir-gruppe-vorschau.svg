<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#ffffff"/>

  <defs>
    <radialGradient id="grpShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(0,0,0,0.20)"/>
      <stop offset="55%" stop-color="rgba(0,0,0,0.11)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- weißer Konturrand (Halo) um die Figur -->
    <filter id="outline" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="6" result="d"/>
      <feFlood flood-color="#ffffff" result="w"/>
      <feComposite in="w" in2="d" operator="in" result="halo"/>
      <feMerge><feMergeNode in="halo"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Piktogramm-Figur (Farbe via currentColor) -->
    <g id="fig" fill="currentColor">
      <line x1="-20" y1="-140" x2="-24" y2="0" stroke="currentColor" stroke-width="32" stroke-linecap="round"/>
      <line x1="20"  y1="-140" x2="24"  y2="0" stroke="currentColor" stroke-width="32" stroke-linecap="round"/>
      <line x1="-30" y1="-274" x2="-44" y2="-140" stroke="currentColor" stroke-width="28" stroke-linecap="round"/>
      <line x1="30"  y1="-274" x2="44"  y2="-140" stroke="currentColor" stroke-width="28" stroke-linecap="round"/>
      <path d="M -40 -140 L -56 -262 Q -56 -296 -22 -296 L 22 -296 Q 56 -296 56 -262 L 40 -140 Z"/>
      <circle cx="0" cy="-352" r="52"/>
    </g>

    <!-- Figur mit erhobenem, winkendem rechten Arm -->
    <g id="figWave" fill="currentColor">
      <line x1="-20" y1="-140" x2="-24" y2="0" stroke="currentColor" stroke-width="32" stroke-linecap="round"/>
      <line x1="20"  y1="-140" x2="24"  y2="0" stroke="currentColor" stroke-width="32" stroke-linecap="round"/>
      <line x1="-30" y1="-274" x2="-44" y2="-140" stroke="currentColor" stroke-width="28" stroke-linecap="round"/>
      <line x1="30"  y1="-274" x2="56"  y2="-302" stroke="currentColor" stroke-width="28" stroke-linecap="round"/>
      <line x1="56"  y1="-302" x2="66"  y2="-372" stroke="currentColor" stroke-width="28" stroke-linecap="round"/>
      <path d="M -40 -140 L -56 -262 Q -56 -296 -22 -296 L 22 -296 Q 56 -296 56 -262 L 40 -140 Z"/>
      <circle cx="0" cy="-352" r="52"/>
    </g>
  </defs>

  <!-- weicher Gruppen-Schatten (statt Boden) -->
  <ellipse cx="450" cy="455" rx="300" ry="62" fill="url(#grpShadow)"/>

  <!-- Gruppe: hinten heller/klein/hoch → vorne dunkler/groß/tief -->
  <use href="#fig" color="#6d6d6d" filter="url(#outline)" transform="translate(372,312) scale(0.42)"/>
  <use href="#fig" color="#666666" filter="url(#outline)" transform="translate(452,305) scale(0.44)"/>
  <use href="#fig" color="#6d6d6d" filter="url(#outline)" transform="translate(534,314) scale(0.42)"/>
  <use href="#fig" color="#454545" filter="url(#outline)" transform="translate(322,382) scale(0.50)"/>
  <use href="#fig" color="#3c3c3c" filter="url(#outline)" transform="translate(412,392) scale(0.52)"/>
  <use href="#fig" color="#454545" filter="url(#outline)" transform="translate(502,386) scale(0.50)"/>
  <use href="#fig" color="#4c4c4c" filter="url(#outline)" transform="translate(588,378) scale(0.48)"/>
  <use href="#fig" color="#1d1d1d" filter="url(#outline)" transform="translate(388,462) scale(0.60)"/>
  <use href="#fig" color="#181818" filter="url(#outline)" transform="translate(504,470) scale(0.62)"/>

  <!-- Beispiel: Hover-Hervorhebung (größer + Winken, voll schwarz) mit Namens-Label -->
  <g>
    <use href="#figWave" color="#0f0f0f" filter="url(#outline)" transform="translate(648,470) scale(0.82)"/>
    <g transform="translate(648,150)">
      <rect x="-46" y="-16" width="92" height="30" rx="7" fill="#0f0f0f"/>
      <path d="M -6 13 L 6 13 L 0 21 Z" fill="#0f0f0f"/>
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="16" font-weight="600"
            fill="#ffffff" text-anchor="middle" dominant-baseline="central">Anna</text>
    </g>
  </g>
</svg>
