name: Bump Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    # Skip if this commit was already made by the action itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment version
        run: |
          # Read current version from index.html (e.g. v1.0 or v1.05)
          CURRENT=$(grep -oP 'nav__version">v\K[0-9]+\.[0-9]+' index.html)
          echo "Current version: $CURRENT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)

          # Increment minor part by 1 (no leading-zero padding)
          NEW_MINOR=$((10#$MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "New version: $NEW_VERSION"

          sed -i "s|nav__version\">v${CURRENT}|nav__version\">v${NEW_VERSION}|g" index.html

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push
