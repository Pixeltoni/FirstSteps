<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie — Erinnerungen</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .upload-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }

    .upload-page__back {
      position: fixed;
      top: 1.5rem;
      left: calc(64px + 1.5rem);
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      color: var(--fg-muted);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: .45rem 1rem;
      background: var(--bg);
      z-index: 10;
    }
    .upload-page__back:hover { color: var(--fg); border-color: var(--fg-muted); }

    /* ── Upload trigger button ── */
    .upload-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      width: min(440px, 88vw);
      aspect-ratio: 1;
      border: 2px dashed var(--border);
      border-radius: 28px;
      background: var(--bg-card);
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
    }
    .upload-btn:hover {
      border-color: var(--accent);
      background: rgba(232,131,74,.06);
      transform: scale(1.02);
      box-shadow: 0 0 60px rgba(232,131,74,.18);
    }
    .upload-btn__icon {
      color: var(--fg-muted);
    }
    .upload-btn:hover .upload-btn__icon { color: var(--accent-2); transform: translateY(-8px); }

    .upload-btn__label {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .upload-btn__sub {
      font-size: .8rem;
      color: var(--fg-muted);
      letter-spacing: .06em;
    }

    .status {
      margin-top: 1.25rem;
      font-size: .82rem;
      min-height: 1.2em;
      color: var(--fg-muted);
      letter-spacing: .04em;
      text-align: center;
    }
    .status.ok    { color: #38c172; }
    .status.error { color: #e64545; }

    /* ── Modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      display: grid; place-items: center;
      opacity: 0; pointer-events: none;
      padding: 2rem;
    }
    .modal.open { opacity: 1; pointer-events: all; }
    .modal__panel {
      width: min(560px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
    }
    .modal.open .modal__panel { }

    .modal__head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal__title {
      font-size: 1.4rem; font-weight: 700; letter-spacing: -.01em;
    }
    .modal__close {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,.06); border: 1px solid var(--border);
      color: var(--fg-muted); font-size: 1rem;
      display: grid; place-items: center; cursor: pointer;
    }
    .modal__close:hover { background: rgba(0,0,0,.12); }

    .field { margin-bottom: 1.1rem; }
    .field__label {
      display: block;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin-bottom: .45rem;
    }
    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: var(--fg);
      font-size: .95rem;
      font-family: inherit;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(232,131,74,.05);
    }

    .file-drop {
      display: block;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.6rem 1rem;
      text-align: center;
      cursor: pointer;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--accent);
      background: rgba(232,131,74,.06);
    }
    .file-drop__hint {
      font-size: .85rem;
      color: var(--fg-muted);
    }
    .file-drop__count {
      display: block;
      margin-top: .4rem;
      font-size: .78rem;
      color: var(--accent-2);
    }

    .modal__actions {
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
      margin-top: 1.75rem;
    }
    .btn-modal {
      padding: .75rem 1.4rem;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .btn-modal--secondary {
      background: transparent;
      color: var(--fg-muted);
    }
    .btn-modal--secondary:hover { color: var(--fg); }
    .btn-modal--primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-modal--primary:hover:not(:disabled) {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    .btn-modal:disabled { opacity: .5; cursor: not-allowed; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 1rem;
    }
    .progress-bar__fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    /* ── Gallery ── */
    .gallery-section {
      width: min(1100px, 94vw);
      margin-top: 3.5rem;
    }
    .gallery-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }
    .gallery-section__title-wrap {
      display: flex; align-items: center; gap: .75rem;
    }
    .gallery-section__back-album {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .7rem;
      font-size: .78rem;
      cursor: pointer;
      color: var(--fg-muted);
    }
    .gallery-section__back-album:hover { color: var(--fg); border-color: var(--fg-muted); }
    .gallery-section__title {
      font-size: 1rem;
      letter-spacing: -.005em;
      color: var(--fg);
      font-weight: 600;
    }
    .gallery-section__sub {
      display: block;
      font-size: .72rem;
      color: var(--fg-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 400;
      margin-top: .15rem;
    }
    .gallery-section__count {
      font-size: .78rem;
      color: var(--fg-muted);
    }

    /* Folder grid */
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .folder-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .folder-card:hover {
      transform: translateY(-3px);
      border-color: var(--fg-muted);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    .folder-card__cover {
      aspect-ratio: 4/3;
      background: var(--bg-card);
      position: relative;
      overflow: hidden;
    }
    .folder-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .folder-card:hover .folder-card__cover img { transform: scale(1.06); }
    .folder-card__cover-placeholder {
      width: 100%; height: 100%;
      display: grid; place-items: center;
      color: var(--fg-muted);
      font-size: 2.6rem;
    }
    .folder-card__count-badge {
      position: absolute; top: 8px; right: 8px;
      padding: .25rem .5rem;
      background: rgba(0,0,0,.7);
      border-radius: 6px;
      font-size: .68rem;
      letter-spacing: .06em;
      color: #fff;
    }
    .folder-card__body { padding: .85rem 1rem 1rem; }
    .folder-card__title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: .35rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-card__meta {
      font-size: .72rem;
      color: var(--fg-muted);
      letter-spacing: .04em;
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .folder-card__meta span::before { content: '· '; opacity: .5; margin-right: .15rem; }
    .folder-card__meta span:first-child::before { content: ''; margin: 0; }

    .folder-card__rm {
      position: absolute; top: 8px; left: 8px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,.75); border: none; color: #fff;
      font-size: .72rem; display: grid; place-items: center;
      opacity: 0; cursor: pointer;
      z-index: 2;
    }
    .folder-card:hover .folder-card__rm { opacity: 1; }
    .folder-card__rm:hover { background: #e64545; }

    /* Photo grid (inside album) */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .75rem;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: zoom-in;
      background: var(--bg-card);
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-item__rm {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,.75); border: none; color: #fff;
      font-size: .68rem; display: grid; place-items: center;
      opacity: 0; cursor: pointer;
    }
    .gallery-item:hover .gallery-item__rm { opacity: 1; }
    .gallery-item__rm:hover { background: #e64545; }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 0;
      color: var(--fg-muted);
      font-size: .88rem;
    }

    /* ── Lightbox ── */
    .lb {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.92); backdrop-filter: blur(6px);
      display: grid; place-items: center;
      opacity: 0; pointer-events: none;
    }
    .lb.open { opacity: 1; pointer-events: all; }
    .lb__img {
      max-width: min(88vw, 1100px); max-height: 88vh;
      object-fit: contain; border-radius: 10px;
    }
    .lb__close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 1.1rem; display: grid; place-items: center;
      cursor: pointer;
    }
    .lb__close:hover { background: rgba(255,255,255,.22); }

    /* ── Password Screen ── */
    #pwScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
    }
    #pwScreen.fade-out { opacity: 0; pointer-events: none; }
    .pw-box {
      width: min(380px, 88vw);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem 2rem 2.25rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .pw-box__title {
      font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em;
      text-align: center;
    }
    .pw-box__sub {
      font-size: .78rem; color: var(--fg-muted);
      text-align: center; letter-spacing: .06em; margin-top: -.75rem;
    }
    .pw-box__input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1rem;
      color: var(--fg); font-size: 1rem; font-family: inherit;
      box-sizing: border-box;
    }
    .pw-box__input:focus { outline: none; border-color: var(--accent); }
    .pw-box__btn {
      width: 100%;
      padding: .85rem;
      border-radius: 10px;
      background: var(--accent);
      color: #fff; font-size: .95rem; font-weight: 700;
      letter-spacing: .03em; cursor: pointer;
      border: none;
    }
    .pw-box__btn:hover { background: var(--accent-2); }
    .pw-box__btn:active { transform: scale(.97); }
    .pw-box__error {
      font-size: .8rem; color: #e64545;
      text-align: center; min-height: 1.1em;
    }

    /* ── Danger button ── */
    .btn-modal--danger { background: #e64545; color: #fff; border-color: #e64545; }
    .btn-modal--danger:hover:not(:disabled) { background: #c93232; border-color: #c93232; }

    /* ── Selection overlay on gallery items ── */
    .gallery-item.selected { border-color: var(--accent); }
    .gallery-item.selected::after {
      content: '✓';
      position: absolute; inset: 0;
      background: rgba(123,94,167,.45);
      display: grid; place-items: center;
      font-size: 1.8rem; color: #fff;
      pointer-events: none;
    }
    .selection-mode .gallery-item { cursor: pointer; }

    /* ── Selection action bar ── */
    #selectionBar {
      position: fixed;
      bottom: 1.5rem;
      left: calc(64px + 1.5rem);
      right: 1.5rem;
      z-index: 500;
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.25rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      flex-wrap: wrap;
    }
    #selectionCount { flex: 1; font-size: .85rem; color: var(--fg-muted); }

    /* ── Album header action buttons ── */
    .gallery-section__actions {
      display: flex; align-items: center; gap: .5rem;
    }
    .btn-gallery-action {
      padding: .4rem .9rem;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--fg-muted);
    }
    .btn-gallery-action:hover { color: var(--fg); border-color: var(--fg-muted); }
    .btn-gallery-action--primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-gallery-action--primary:hover { background: var(--accent-2); border-color: var(--accent-2); }

    /* ── Move album list ── */
    #moveAlbumList { max-height: 50vh; overflow-y: auto; margin-top: .5rem; }
    .move-album-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .85rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .move-album-item:hover { background: rgba(0,0,0,.04); border-color: var(--border); }
    .move-album-item__thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: var(--bg-card); flex-shrink: 0;
    }
    .move-album-item__name { font-size: .92rem; font-weight: 600; }
  </style>
</head>
<body>

  <a href="index.html" class="upload-page__back">
    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="10 3 5 8 10 13"/>
    </svg>
    Zurück
  </a>

  <main class="upload-page">

    <button class="upload-btn" id="uploadBtn" type="button">
      <div class="upload-btn__icon">
        <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M32 44 V20 M20 32 L32 20 L44 32"/>
          <path d="M12 44 v6 a4 4 0 0 0 4 4 h32 a4 4 0 0 0 4-4 v-6"/>
        </svg>
      </div>
      <span class="upload-btn__label">UPLOAD</span>
      <span class="upload-btn__sub">Neues Album erstellen</span>
    </button>

    <p class="status" id="status"></p>

    <!-- Gallery (folders or album view) -->
    <section class="gallery-section">
      <div class="gallery-section__head">
        <div class="gallery-section__title-wrap">
          <button class="gallery-section__back-album" id="backToFolders" hidden>← Zurück</button>
          <div>
            <span class="gallery-section__title" id="gallerySectionTitle">Alben</span>
            <span class="gallery-section__sub" id="gallerySectionSub">Galerie</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span class="gallery-section__count" id="galleryCount"></span>
          <div class="gallery-section__actions" id="albumActions" hidden>
            <button class="btn-gallery-action btn-gallery-action--primary" id="addImagesBtn" type="button">+ Bilder hinzufügen</button>
            <button class="btn-gallery-action" id="selectModeBtn" type="button">Auswählen</button>
          </div>
        </div>
        <input type="file" id="addImagesInput" accept="image/*" multiple hidden>
      </div>

      <div class="folder-grid" id="folderGrid" style="display:none">
        <p class="gallery-empty">Lade Alben…</p>
      </div>

      <div class="gallery-grid" id="galleryGrid" style="display:none"></div>

      <div id="selectionBar" hidden>
        <span id="selectionCount">0 ausgewählt</span>
        <button class="btn-gallery-action" id="moveSelectedBtn" type="button">Verschieben</button>
        <button class="btn-gallery-action btn-modal--danger" id="deleteSelectedBtn" type="button" style="border-radius:8px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;letter-spacing:.02em;cursor:pointer">Löschen</button>
      </div>
    </section>

  </main>

  <!-- ── Upload Modal ── -->
  <div class="modal" id="uploadModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__panel">
      <div class="modal__head">
        <h2 class="modal__title">Neues Album</h2>
        <button class="modal__close" id="modalClose" aria-label="Schließen">✕</button>
      </div>

      <div class="field">
        <label class="field__label" for="albumName">Name</label>
        <input type="text" id="albumName" placeholder="z.B. Wien Wochenende" autocomplete="off" />
      </div>

      <div class="field">
        <label class="field__label">Datum</label>
        <div style="display:flex;gap:.6rem;align-items:center;">
          <input type="date" id="albumDateFrom" autocomplete="off" style="flex:1;" />
          <span style="font-size:.8rem;color:var(--fg-muted);flex-shrink:0;">bis</span>
          <input type="date" id="albumDateTo" autocomplete="off" style="flex:1;" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="albumLocation">Ort</label>
        <input type="text" id="albumLocation" placeholder="z.B. Wien, Österreich" autocomplete="off" />
      </div>

      <div class="field">
        <label class="field__label">Fotos</label>
        <label class="file-drop" id="fileDrop" for="albumFiles">
          <span class="file-drop__hint">Klicken oder Bilder hineinziehen</span>
          <span class="file-drop__count" id="fileCount"></span>
          <input type="file" id="albumFiles" accept="image/*" multiple hidden />
        </label>
      </div>

      <div class="progress-bar" id="progressBar" hidden>
        <div class="progress-bar__fill" id="progressFill"></div>
      </div>

      <div class="modal__actions">
        <button type="button" class="btn-modal btn-modal--secondary" id="modalCancel">Abbrechen</button>
        <button type="button" class="btn-modal btn-modal--primary" id="modalSave">Album erstellen</button>
      </div>
    </div>
  </div>

  <!-- ── Password Screen ── -->
  <div id="pwScreen">
    <div class="pw-box">
      <p class="pw-box__title">Galerie</p>
      <p class="pw-box__sub">SMARTSTUDIO</p>
      <input class="pw-box__input" id="pwInput" type="password" placeholder="Passwort" autocomplete="current-password" />
      <p class="pw-box__error" id="pwError"></p>
      <button class="pw-box__btn" id="pwSubmit" type="button">Weiter</button>
    </div>
  </div>

  <!-- ── Confirm Modal ── -->
  <div class="modal" id="confirmModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__panel">
      <div class="modal__head">
        <h2 class="modal__title" id="confirmTitle">Löschen</h2>
        <button class="modal__close" id="confirmClose" aria-label="Schließen">✕</button>
      </div>
      <p id="confirmMsg" style="color:var(--fg-muted);font-size:.9rem;line-height:1.5;margin:0 0 .5rem"></p>
      <div class="modal__actions">
        <button type="button" class="btn-modal btn-modal--secondary" id="confirmCancel">Abbrechen</button>
        <button type="button" class="btn-modal btn-modal--danger" id="confirmOk">Löschen</button>
      </div>
    </div>
  </div>

  <!-- ── Move Modal ── -->
  <div class="modal" id="moveModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__panel">
      <div class="modal__head">
        <h2 class="modal__title">In Album verschieben</h2>
        <button class="modal__close" id="moveClose" aria-label="Schließen">✕</button>
      </div>
      <div id="moveAlbumList"></div>

      <!-- Neues Album inline -->
      <div id="newAlbumRow" style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;display:none;flex-direction:column;gap:.5rem;">
        <input type="text" id="newAlbumNameInput" class="pw-box__input" placeholder="Albumname" autocomplete="off" style="font-size:.9rem;padding:.65rem .9rem;" />
        <button type="button" class="btn-modal btn-modal--primary" id="newAlbumConfirm">Album erstellen &amp; verschieben</button>
      </div>

      <div class="modal__actions">
        <button type="button" class="btn-modal btn-modal--secondary" id="moveCancel">Abbrechen</button>
        <button type="button" class="btn-modal btn-modal--primary" id="moveNewAlbumBtn">+ Neues Album</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb" role="dialog" aria-modal="true" aria-hidden="true">
    <button class="lb__close" id="lbClose">✕</button>
    <img class="lb__img" id="lbImg" src="" alt="" />
  </div>

  <script>
    const SUPABASE_URL = 'https://rtzvvthcdxklwayhsuha.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0enZ2dGhjZHhrbHdheWhzdWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzUxMzEsImV4cCI6MjA5Mzc1MTEzMX0.8nGc1tqVq2PL1QK2EArexbXpX01-OK8-9MfLUI4Wnfw';
    const BUCKET = 'galerie';

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── DOM ──
    const uploadBtn   = document.getElementById('uploadBtn');
    const folderGrid  = document.getElementById('folderGrid');
    const galleryGrid = document.getElementById('galleryGrid');
    const sectionTitle = document.getElementById('gallerySectionTitle');
    const sectionSub   = document.getElementById('gallerySectionSub');
    const sectionCount = document.getElementById('galleryCount');
    const backBtn     = document.getElementById('backToFolders');
    const statusEl    = document.getElementById('status');
    const modal       = document.getElementById('uploadModal');
    const modalClose  = document.getElementById('modalClose');
    const modalCancel = document.getElementById('modalCancel');
    const modalSave   = document.getElementById('modalSave');
    const fAlbumName  = document.getElementById('albumName');
    const fAlbumDateFrom = document.getElementById('albumDateFrom');
    const fAlbumDateTo   = document.getElementById('albumDateTo');
    const fAlbumLoc   = document.getElementById('albumLocation');
    const fAlbumFiles = document.getElementById('albumFiles');
    const fileDrop    = document.getElementById('fileDrop');
    const fileCount   = document.getElementById('fileCount');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const lb          = document.getElementById('lb');
    const lbImg       = document.getElementById('lbImg');

    let currentFolder = null;       // null = folder list view; else album path
    let pendingFiles  = [];
    let selectedPaths = new Set();
    let isSelectMode  = false;

    // ── New DOM refs ──
    const albumActions     = document.getElementById('albumActions');
    const addImagesBtn     = document.getElementById('addImagesBtn');
    const addImagesInput   = document.getElementById('addImagesInput');
    const selectModeBtn    = document.getElementById('selectModeBtn');
    const selectionBar     = document.getElementById('selectionBar');
    const selectionCount   = document.getElementById('selectionCount');
    const moveSelectedBtn  = document.getElementById('moveSelectedBtn');
    const deleteSelectedBtn= document.getElementById('deleteSelectedBtn');
    const confirmModal     = document.getElementById('confirmModal');
    const confirmTitle     = document.getElementById('confirmTitle');
    const confirmMsg       = document.getElementById('confirmMsg');
    const confirmOk        = document.getElementById('confirmOk');
    const confirmCancel    = document.getElementById('confirmCancel');
    const confirmClose     = document.getElementById('confirmClose');
    const moveModal        = document.getElementById('moveModal');
    const moveAlbumList    = document.getElementById('moveAlbumList');
    const moveCancel       = document.getElementById('moveCancel');
    const moveClose        = document.getElementById('moveClose');

    // ── Helpers ──
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className   = 'status ' + type;
      if (msg) setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, 4500);
    }

    function slugify(s) {
      return (s || 'album')
        .toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40)
        || 'album';
    }

    function formatDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${d}.${m}.${y}`;
    }

    // ── Confirm Modal ──
    function showConfirm(title, msg) {
      return new Promise(resolve => {
        confirmTitle.textContent = title;
        confirmMsg.textContent   = msg;
        confirmModal.classList.add('open');
        confirmModal.setAttribute('aria-hidden', 'false');
        function ok()  { cleanup(); resolve(true);  }
        function no()  { cleanup(); resolve(false); }
        function cleanup() {
          confirmOk.removeEventListener('click', ok);
          confirmCancel.removeEventListener('click', no);
          confirmClose.removeEventListener('click', no);
          confirmModal.classList.remove('open');
          confirmModal.setAttribute('aria-hidden', 'true');
        }
        confirmOk.addEventListener('click', ok);
        confirmCancel.addEventListener('click', no);
        confirmClose.addEventListener('click', no);
      });
    }
    confirmModal.addEventListener('click', e => { if (e.target === confirmModal) confirmCancel.click(); });

    // ── Selection mode ──
    function enterSelectMode() {
      isSelectMode = true;
      galleryGrid.classList.add('selection-mode');
      selectionBar.hidden = false;
      addImagesBtn.hidden = true;
      selectModeBtn.textContent = 'Abbrechen';
      selectionCount.textContent = '0 ausgewählt';
    }

    function exitSelectMode() {
      isSelectMode = false;
      selectedPaths.clear();
      galleryGrid.classList.remove('selection-mode');
      selectionBar.hidden = true;
      addImagesBtn.hidden = false;
      selectModeBtn.textContent = 'Auswählen';
      galleryGrid.querySelectorAll('.gallery-item.selected').forEach(el => el.classList.remove('selected'));
    }

    selectModeBtn.addEventListener('click', () => {
      if (isSelectMode) exitSelectMode();
      else              enterSelectMode();
    });

    // ── Add images to existing album ──
    addImagesBtn.addEventListener('click', () => addImagesInput.click());
    addImagesInput.addEventListener('change', async () => {
      const files = Array.from(addImagesInput.files).filter(f => f.type.startsWith('image/'));
      addImagesInput.value = '';
      if (!files.length || !currentFolder) return;

      addImagesBtn.disabled = true;
      addImagesBtn.textContent = 'Lädt…';
      let ok = 0, fail = 0;
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const safeName = `${Date.now()}-${i}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error } = await db.storage
          .from(BUCKET)
          .upload(`${currentFolder}/${safeName}`, file, { contentType: file.type, upsert: false });
        if (error) { fail++; console.error(error); } else ok++;
      }
      addImagesBtn.disabled = false;
      addImagesBtn.textContent = '+ Bilder hinzufügen';
      if (fail === 0) setStatus(`${ok} Bild${ok > 1 ? 'er' : ''} hinzugefügt ✓`, 'ok');
      else            setStatus(`${ok} hochgeladen, ${fail} fehlgeschlagen`, 'error');
      await openAlbum(currentFolder);
    });

    // ── Delete selected ──
    deleteSelectedBtn.addEventListener('click', async () => {
      const n = selectedPaths.size;
      if (!n) return;
      const confirmed = await showConfirm(
        `${n} Bild${n > 1 ? 'er' : ''} löschen`,
        `Sollen ${n} Bild${n > 1 ? 'er' : ''} wirklich dauerhaft gelöscht werden? Diese Aktion kann nicht rückgängig gemacht werden.`
      );
      if (!confirmed) return;
      const { error } = await db.storage.from(BUCKET).remove([...selectedPaths]);
      if (error) { setStatus('Löschen fehlgeschlagen: ' + error.message, 'error'); return; }
      exitSelectMode();
      setStatus(`${n} Bild${n > 1 ? 'er' : ''} gelöscht`, 'ok');
      await openAlbum(currentFolder);
    });

    // ── Move selected ──
    moveSelectedBtn.addEventListener('click', async () => {
      if (!selectedPaths.size) return;
      moveAlbumList.innerHTML = '<p style="color:var(--fg-muted);font-size:.85rem;padding:.5rem .85rem">Lade Alben…</p>';
      moveModal.classList.add('open');
      moveModal.setAttribute('aria-hidden', 'false');

      const { data } = await db.storage.from(BUCKET).list('', { limit: 200 });
      const folders = (data || [])
        .filter(e => e && e.name && e.id === null && e.name !== currentFolder)
        .map(e => e.name);

      if (!folders.length) {
        moveAlbumList.innerHTML = '<p style="color:var(--fg-muted);font-size:.85rem;padding:.5rem .85rem">Keine anderen Alben vorhanden.</p>';
        return;
      }

      const items = await Promise.all(folders.map(async folder => {
        const { data: sub } = await db.storage.from(BUCKET).list(folder, { limit: 10 });
        const photos = (sub || []).filter(f => f.name && f.name !== '_meta.json' && f.id);
        let name = folder;
        const metaItem = (sub || []).find(f => f.name === '_meta.json');
        if (metaItem) {
          try {
            const { data: mu } = db.storage.from(BUCKET).getPublicUrl(`${folder}/_meta.json`);
            const r = await fetch(mu.publicUrl + '?t=' + Date.now());
            if (r.ok) { const m = await r.json(); name = m.name || folder; }
          } catch (e) {}
        }
        const cover = photos[0]
          ? db.storage.from(BUCKET).getPublicUrl(`${folder}/${photos[0].name}`).data.publicUrl
          : null;
        return { folder, name, cover };
      }));

      moveAlbumList.innerHTML = '';
      items.forEach(({ folder, name, cover }) => {
        const el = document.createElement('div');
        el.className = 'move-album-item';
        el.innerHTML = cover
          ? `<img class="move-album-item__thumb" src="${cover}" alt="" loading="lazy"><span class="move-album-item__name">${name}</span>`
          : `<div class="move-album-item__thumb"></div><span class="move-album-item__name">${name}</span>`;
        el.addEventListener('click', () => doMoveImages(folder));
        moveAlbumList.appendChild(el);
      });
    });

    async function doMoveImages(targetFolder) {
      closeMoveModal();
      const paths = [...selectedPaths];
      const n = paths.length;
      setStatus('Verschiebe Bilder…', '');
      let ok = 0, fail = 0;

      for (const srcPath of paths) {
        const fileName = srcPath.split('/').pop();
        const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(srcPath);
        try {
          const resp = await fetch(urlData.publicUrl);
          if (!resp.ok) throw new Error('Download fehlgeschlagen');
          const blob = await resp.blob();
          const { error: upErr } = await db.storage
            .from(BUCKET)
            .upload(`${targetFolder}/${fileName}`, blob, { contentType: blob.type, upsert: false });
          if (upErr) { fail++; continue; }
          await db.storage.from(BUCKET).remove([srcPath]);
          ok++;
        } catch (e) { fail++; console.error(e); }
      }

      exitSelectMode();
      if (fail === 0) setStatus(`${ok} Bild${ok > 1 ? 'er' : ''} verschoben ✓`, 'ok');
      else            setStatus(`${ok} verschoben, ${fail} fehlgeschlagen`, 'error');
      await openAlbum(currentFolder);
    }

    function closeMoveModal() {
      moveModal.classList.remove('open');
      moveModal.setAttribute('aria-hidden', 'true');
      document.getElementById('newAlbumRow').style.display = 'none';
      document.getElementById('newAlbumNameInput').value = '';
    }
    moveCancel.addEventListener('click', closeMoveModal);
    moveClose.addEventListener('click', closeMoveModal);

    // ── Neues Album erstellen & verschieben ──
    document.getElementById('moveNewAlbumBtn').addEventListener('click', () => {
      const row = document.getElementById('newAlbumRow');
      row.style.display = row.style.display === 'none' ? 'flex' : 'none';
      if (row.style.display === 'flex') {
        setTimeout(() => document.getElementById('newAlbumNameInput').focus(), 50);
      }
    });

    document.getElementById('newAlbumConfirm').addEventListener('click', async () => {
      const name = document.getElementById('newAlbumNameInput').value.trim();
      if (!name) { document.getElementById('newAlbumNameInput').focus(); return; }

      const btn = document.getElementById('newAlbumConfirm');
      btn.disabled = true;
      btn.textContent = 'Erstelle Album…';

      const folderId = `${slugify(name)}-${Date.now()}`;
      const meta = { name, date: new Date().toISOString().slice(0, 10), location: '', created_at: new Date().toISOString() };
      const metaBlob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });

      const { error: metaErr } = await db.storage
        .from(BUCKET)
        .upload(`${folderId}/_meta.json`, metaBlob, { contentType: 'application/json', upsert: true });

      if (metaErr) {
        setStatus('Fehler beim Erstellen: ' + metaErr.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Album erstellen & verschieben';
        return;
      }

      closeMoveModal();
      await doMoveImages(folderId);
    });

    document.getElementById('newAlbumNameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('newAlbumConfirm').click();
    });
    moveModal.addEventListener('click', e => { if (e.target === moveModal) closeMoveModal(); });

    // ── Upload Modal ──
    function openModal() {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      fAlbumName.value = '';
      fAlbumDateFrom.value = new Date().toISOString().slice(0, 10);
      fAlbumDateTo.value   = '';
      fAlbumLoc.value  = '';
      fAlbumFiles.value = '';
      pendingFiles = [];
      fileCount.textContent = '';
      progressBar.hidden = true;
      progressFill.style.width = '0';
      modalSave.disabled = false;
      modalSave.textContent = 'Album erstellen';
      setTimeout(() => fAlbumName.focus(), 250);
    }
    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    uploadBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // File picker
    fAlbumFiles.addEventListener('change', () => {
      pendingFiles = Array.from(fAlbumFiles.files).filter(f => f.type.startsWith('image/'));
      fileCount.textContent = pendingFiles.length
        ? `${pendingFiles.length} Bild${pendingFiles.length > 1 ? 'er' : ''} ausgewählt`
        : '';
    });
    fileDrop.addEventListener('dragover',  e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      const dropped = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (!dropped.length) return;
      pendingFiles = pendingFiles.concat(dropped);
      fileCount.textContent = `${pendingFiles.length} Bild${pendingFiles.length > 1 ? 'er' : ''} ausgewählt`;
    });

    // Save album
    modalSave.addEventListener('click', async () => {
      const name = fAlbumName.value.trim();
      const dateFrom = fAlbumDateFrom.value;
      const dateTo   = fAlbumDateTo.value;
      const loc      = fAlbumLoc.value.trim();

      if (!name) { fAlbumName.focus(); return; }
      if (!pendingFiles.length) { fileDrop.click(); return; }

      modalSave.disabled = true;
      modalSave.textContent = 'Lädt…';
      progressBar.hidden = false;

      const folderId = `${slugify(name)}-${Date.now()}`;
      const meta = { name, dateFrom, dateTo, location: loc, created_at: new Date().toISOString() };

      // Upload meta
      const metaBlob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
      const { error: metaErr } = await db.storage
        .from(BUCKET)
        .upload(`${folderId}/_meta.json`, metaBlob, { contentType: 'application/json', upsert: true });
      if (metaErr) {
        console.error(metaErr);
        setStatus('Fehler beim Speichern der Album-Daten: ' + metaErr.message, 'error');
        modalSave.disabled = false;
        modalSave.textContent = 'Album erstellen';
        return;
      }

      // Upload files
      let ok = 0, fail = 0;
      for (let i = 0; i < pendingFiles.length; i++) {
        const file = pendingFiles[i];
        const safeName = `${Date.now()}-${i}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error } = await db.storage
          .from(BUCKET)
          .upload(`${folderId}/${safeName}`, file, { contentType: file.type, upsert: false });
        if (error) { fail++; console.error(error); }
        else ok++;
        progressFill.style.width = `${((i + 1) / pendingFiles.length) * 100}%`;
      }

      closeModal();
      if (fail === 0) setStatus(`Album "${name}" erstellt — ${ok} Bild${ok > 1 ? 'er' : ''} hochgeladen ✓`, 'ok');
      else            setStatus(`Album erstellt: ${ok} hochgeladen, ${fail} fehlgeschlagen`, 'error');

      await loadFolders();
    });

    // ── Load folder list ──
    async function loadFolders() {
      currentFolder = null;
      exitSelectMode();
      albumActions.hidden = true;
      backBtn.hidden = true;
      sectionTitle.textContent = 'Alben';
      sectionSub.textContent   = 'Galerie';
      folderGrid.style.display = '';
      galleryGrid.style.display = 'none';
      selectionBar.hidden = true;
      folderGrid.innerHTML = '<p class="gallery-empty">Lade Alben…</p>';

      const { data, error } = await db.storage.from(BUCKET).list('', { limit: 200 });
      if (error) {
        folderGrid.innerHTML = `<p class="gallery-empty" style="color:#e64545">Ladefehler: ${error.message}</p>`;
        return;
      }

      // Folder entries from list() come back with id=null
      const folderNames = (data || [])
        .filter(e => e && e.name && e.id === null)
        .map(e => e.name);

      // Also handle legacy: files at root (uploaded before albums existed)
      const legacyFiles = (data || []).filter(e => e && e.id && e.name && e.name !== '.emptyFolderPlaceholder');

      sectionCount.textContent = folderNames.length
        ? `${folderNames.length} Album${folderNames.length > 1 ? 'en' : ''}`
        : '';

      if (!folderNames.length && !legacyFiles.length) {
        folderGrid.innerHTML = '<p class="gallery-empty">Noch keine Alben. Klicke auf UPLOAD um zu starten.</p>';
        return;
      }

      // Fetch meta + first image per folder
      const cards = await Promise.all(folderNames.map(async folder => {
        const { data: items } = await db.storage.from(BUCKET).list(folder, { limit: 100 });
        const photos = (items || []).filter(f => f.name && f.name !== '_meta.json' && f.id);
        let meta = { name: folder, date: '', location: '' };
        const metaItem = (items || []).find(f => f.name === '_meta.json');
        if (metaItem) {
          try {
            const { data: metaUrl } = db.storage.from(BUCKET).getPublicUrl(`${folder}/_meta.json`);
            const r = await fetch(metaUrl.publicUrl + '?t=' + Date.now());
            if (r.ok) meta = { ...meta, ...(await r.json()) };
          } catch (e) { console.warn('meta load failed', folder, e); }
        }
        const cover = photos[0]
          ? db.storage.from(BUCKET).getPublicUrl(`${folder}/${photos[0].name}`).data.publicUrl
          : null;
        return { folder, meta, count: photos.length, cover };
      }));

      // Sort: newest by meta.created_at desc
      cards.sort((a, b) => (b.meta.created_at || '').localeCompare(a.meta.created_at || ''));

      folderGrid.innerHTML = '';

      cards.forEach(c => {
        const card = document.createElement('div');
        card.className = 'folder-card';
        card.dataset.folder = c.folder;
        card.innerHTML = `
          <button class="folder-card__rm" data-action="rm-folder" aria-label="Album löschen">✕</button>
          <div class="folder-card__cover">
            ${c.cover ? `<img src="${c.cover}" alt="" loading="lazy">` : '<div class="folder-card__cover-placeholder">⌑</div>'}
            <span class="folder-card__count-badge">${c.count} Foto${c.count !== 1 ? 's' : ''}</span>
          </div>
          <div class="folder-card__body">
            <div class="folder-card__title">${c.meta.name || c.folder}</div>
            <div class="folder-card__meta">
              ${c.meta.dateFrom ? `<span>${formatDate(c.meta.dateFrom)}${c.meta.dateTo ? ' – ' + formatDate(c.meta.dateTo) : ''}</span>` : (c.meta.date ? `<span>${formatDate(c.meta.date)}</span>` : '')}
              ${c.meta.location ? `<span>${c.meta.location}</span>` : ''}
            </div>
          </div>
        `;
        folderGrid.appendChild(card);
      });

      if (legacyFiles.length) {
        const legacy = document.createElement('div');
        legacy.className = 'folder-card';
        legacy.dataset.folder = '__legacy__';
        const legacyCover = db.storage.from(BUCKET).getPublicUrl(legacyFiles[0].name).data.publicUrl;
        legacy.innerHTML = `
          <div class="folder-card__cover">
            <img src="${legacyCover}" alt="" loading="lazy">
            <span class="folder-card__count-badge">${legacyFiles.length} Foto${legacyFiles.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="folder-card__body">
            <div class="folder-card__title">Ohne Album</div>
            <div class="folder-card__meta"><span>Ältere Uploads</span></div>
          </div>
        `;
        folderGrid.appendChild(legacy);
      }
    }

    // ── Open album ──
    async function openAlbum(folder) {
      currentFolder = folder;
      folderGrid.style.display = 'none';
      galleryGrid.style.display = '';
      backBtn.hidden = false;
      albumActions.hidden = false;
      galleryGrid.innerHTML = '<p class="gallery-empty">Lade Bilder…</p>';

      let files, metaText = '';
      if (folder === '__legacy__') {
        const { data } = await db.storage.from(BUCKET).list('', { limit: 200 });
        files = (data || [])
          .filter(f => f && f.id && f.name && f.name !== '.emptyFolderPlaceholder')
          .map(f => ({ name: f.name, fullPath: f.name }));
        sectionTitle.textContent = 'Ohne Album';
        sectionSub.textContent = 'Ältere Uploads';
      } else {
        const { data } = await db.storage.from(BUCKET).list(folder, { limit: 500 });
        files = (data || [])
          .filter(f => f.name && f.name !== '_meta.json' && f.id)
          .map(f => ({ name: f.name, fullPath: `${folder}/${f.name}` }));

        // Try to load meta
        try {
          const { data: metaUrl } = db.storage.from(BUCKET).getPublicUrl(`${folder}/_meta.json`);
          const r = await fetch(metaUrl.publicUrl + '?t=' + Date.now());
          if (r.ok) {
            const meta = await r.json();
            sectionTitle.textContent = meta.name || folder;
            const parts = [];
            if (meta.dateFrom) parts.push(formatDate(meta.dateFrom) + (meta.dateTo ? ' – ' + formatDate(meta.dateTo) : ''));
            else if (meta.date) parts.push(formatDate(meta.date));
            if (meta.location) parts.push(meta.location);
            metaText = parts.join(' · ');
          } else {
            sectionTitle.textContent = folder;
          }
        } catch (e) {
          sectionTitle.textContent = folder;
        }
        sectionSub.textContent = metaText || 'Album';
      }

      sectionCount.textContent = files.length
        ? `${files.length} Bild${files.length > 1 ? 'er' : ''}`
        : '';

      if (!files.length) {
        galleryGrid.innerHTML = '<p class="gallery-empty">Album ist leer.</p>';
        return;
      }

      galleryGrid.innerHTML = '';
      files.forEach((file, i) => {
        const url = db.storage.from(BUCKET).getPublicUrl(file.fullPath).data.publicUrl;
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.dataset.path = file.fullPath;
        div.dataset.url  = url;
        div.innerHTML = `<img src="${url}" alt="" loading="lazy">
                         <button class="gallery-item__rm" aria-label="Löschen">✕</button>`;
        galleryGrid.appendChild(div);
      });
    }

    // ── Folder grid clicks ──
    folderGrid.addEventListener('click', async e => {
      const rmBtn = e.target.closest('[data-action="rm-folder"]');
      if (rmBtn) {
        e.stopPropagation();
        const card = rmBtn.closest('.folder-card');
        const folder = card.dataset.folder;
        const albumName = card.querySelector('.folder-card__title').textContent;
        const confirmed = await showConfirm(
          `Album löschen`,
          `Album "${albumName}" inkl. aller Bilder wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`
        );
        if (!confirmed) return;
        const { data: items, error } = await db.storage.from(BUCKET).list(folder, { limit: 1000 });
        if (error) { setStatus('Löschen fehlgeschlagen: ' + error.message, 'error'); return; }
        const paths = (items || []).map(f => `${folder}/${f.name}`);
        if (paths.length) {
          const { error: rmErr } = await db.storage.from(BUCKET).remove(paths);
          if (rmErr) { setStatus('Löschen fehlgeschlagen: ' + rmErr.message, 'error'); return; }
        }
        setStatus('Album gelöscht', 'ok');
        await loadFolders();
        return;
      }
      const card = e.target.closest('.folder-card');
      if (card) openAlbum(card.dataset.folder);
    });

    // ── Album grid clicks ──
    galleryGrid.addEventListener('click', async e => {
      const item  = e.target.closest('.gallery-item');
      const rmBtn = e.target.closest('.gallery-item__rm');
      const img   = e.target.closest('.gallery-item img');

      if (isSelectMode) {
        if (!item) return;
        const path = item.dataset.path;
        if (selectedPaths.has(path)) { selectedPaths.delete(path); item.classList.remove('selected'); }
        else                          { selectedPaths.add(path);    item.classList.add('selected'); }
        selectionCount.textContent = `${selectedPaths.size} ausgewählt`;
        return;
      }

      if (rmBtn) {
        e.stopPropagation();
        const path = rmBtn.closest('.gallery-item').dataset.path;
        const confirmed = await showConfirm('Bild löschen', 'Dieses Bild wirklich dauerhaft löschen?');
        if (!confirmed) return;
        const { error } = await db.storage.from(BUCKET).remove([path]);
        if (error) { setStatus('Löschen fehlgeschlagen', 'error'); return; }
        await openAlbum(currentFolder);
      } else if (img) {
        const url = img.closest('.gallery-item').dataset.url;
        lbImg.src = url;
        lb.classList.add('open');
        lb.setAttribute('aria-hidden', 'false');
      }
    });

    backBtn.addEventListener('click', loadFolders);

    // ── Lightbox ──
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (lb.classList.contains('open'))          return closeLb();
      if (confirmModal.classList.contains('open')) return confirmCancel.click();
      if (moveModal.classList.contains('open'))    return closeMoveModal();
      if (modal.classList.contains('open'))        return closeModal();
    });
    function closeLb() {
      lb.classList.remove('open');
      lb.setAttribute('aria-hidden', 'true');
      lbImg.src = '';
    }

    // ── Password Protection ──
    // To change the password:
    //   1. Run in browser console: crypto.subtle.digest('SHA-256', new TextEncoder().encode('IhrPasswort')).then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
    //   2. Replace PW_HASH below with the printed value.
    const PW_HASH    = '0c78845b26a28951c473b4dfc9c1a5305a657db1b2b4481de86a2dcec564fdcd'; // SmartStudio
    const PW_SESSION = 'gallery-auth-v1';
    const pwScreen   = document.getElementById('pwScreen');
    const pwInput    = document.getElementById('pwInput');
    const pwSubmit   = document.getElementById('pwSubmit');
    const pwError    = document.getElementById('pwError');

    async function hashString(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    async function tryUnlock() {
      pwError.textContent = '';
      pwSubmit.disabled = true;
      const hash = await hashString(pwInput.value);
      if (hash === PW_HASH) {
        sessionStorage.setItem(PW_SESSION, '1');
        pwScreen.classList.add('fade-out');
        setTimeout(() => pwScreen.remove(), 420);
      } else {
        pwError.textContent = 'Falsches Passwort';
        pwInput.value = '';
        pwInput.focus();
      }
      pwSubmit.disabled = false;
    }

    pwSubmit.addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

    if (sessionStorage.getItem(PW_SESSION)) {
      pwScreen.remove();
    }

    // ── Init ──
    loadFolders();
  </script>
</body>
</html>
