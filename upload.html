<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie — Erinnerungen</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .upload-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }

    .upload-page__back {
      position: fixed;
      top: 1.5rem;
      left: calc(64px + 1.5rem);
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      color: var(--fg-muted);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: .45rem 1rem;
      background: var(--bg);
      z-index: 10;
    }
    .upload-page__back:hover { color: var(--fg); border-color: var(--fg-muted); }

    /* ── Upload trigger button ── */
    .upload-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      width: min(440px, 88vw);
      aspect-ratio: 1;
      border: 2px dashed var(--border);
      border-radius: 28px;
      background: var(--bg-card);
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
    }
    .upload-btn:hover {
      border-color: var(--accent);
      background: rgba(232,131,74,.06);
      transform: scale(1.02);
      box-shadow: 0 0 60px rgba(232,131,74,.18);
    }
    .upload-btn__icon {
      color: var(--fg-muted);
    }
    .upload-btn:hover .upload-btn__icon { color: var(--accent-2); transform: translateY(-8px); }

    .upload-btn__label {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .upload-btn__sub {
      font-size: .8rem;
      color: var(--fg-muted);
      letter-spacing: .06em;
    }

    .status {
      margin-top: 1.25rem;
      font-size: .82rem;
      min-height: 1.2em;
      color: var(--fg-muted);
      letter-spacing: .04em;
      text-align: center;
    }
    .status.ok    { color: #38c172; }
    .status.error { color: #e64545; }

    /* ── Modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      display: grid; place-items: center;
      opacity: 0; pointer-events: none;
      padding: 2rem;
    }
    .modal.open { opacity: 1; pointer-events: all; }
    .modal__panel {
      width: min(560px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
    }
    .modal.open .modal__panel { }

    .modal__head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal__title {
      font-size: 1.4rem; font-weight: 700; letter-spacing: -.01em;
    }
    .modal__close {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,.06); border: 1px solid var(--border);
      color: var(--fg-muted); font-size: 1rem;
      display: grid; place-items: center; cursor: pointer;
    }
    .modal__close:hover { background: rgba(0,0,0,.12); }

    .field { margin-bottom: 1.1rem; }
    .field__label {
      display: block;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin-bottom: .45rem;
    }
    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: var(--fg);
      font-size: .95rem;
      font-family: inherit;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(232,131,74,.05);
    }

    .file-drop {
      display: block;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.6rem 1rem;
      text-align: center;
      cursor: pointer;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--accent);
      background: rgba(232,131,74,.06);
    }
    .file-drop__hint {
      font-size: .85rem;
      color: var(--fg-muted);
    }
    .file-drop__count {
      display: block;
      margin-top: .4rem;
      font-size: .78rem;
      color: var(--accent-2);
    }

    .modal__actions {
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
      margin-top: 1.75rem;
    }
    .btn-modal {
      padding: .75rem 1.4rem;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .btn-modal--secondary {
      background: transparent;
      color: var(--fg-muted);
    }
    .btn-modal--secondary:hover { color: var(--fg); }
    .btn-modal--primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-modal--primary:hover:not(:disabled) {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    .btn-modal:disabled { opacity: .5; cursor: not-allowed; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 1rem;
    }
    .progress-bar__fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    /* ── Gallery ── */
    .gallery-section {
      width: min(1100px, 94vw);
      margin-top: 3.5rem;
    }
    .gallery-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }
    .gallery-section__title-wrap {
      display: flex; align-items: center; gap: .75rem;
    }
    .gallery-section__back-album {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .7rem;
      font-size: .78rem;
      cursor: pointer;
      color: var(--fg-muted);
    }
    .gallery-section__back-album:hover { color: var(--fg); border-color: var(--fg-muted); }
    .gallery-section__title {
      font-size: 1rem;
      letter-spacing: -.005em;
      color: var(--fg);
      font-weight: 600;
    }
    .gallery-section__sub {
      display: block;
      font-size: .72rem;
      color: var(--fg-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 400;
      margin-top: .15rem;
    }
    .gallery-section__count {
      font-size: .78rem;
      color: var(--fg-muted);
    }

    /* Folder grid */
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .folder-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .folder-card:hover {
      transform: translateY(-3px);
      border-color: var(--fg-muted);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    .folder-card__cover {
      aspect-ratio: 4/3;
      background: var(--bg-card);
      position: relative;
      overflow: hidden;
    }
    .folder-card__cover img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .folder-card:hover .folder-card__cover img { transform: scale(1.06); }
    .folder-card__cover-placeholder {
      width: 100%; height: 100%;
      display: grid; place-items: center;
      color: var(--fg-muted);
      font-size: 2.6rem;
    }
    .folder-card__count-badge {
      position: absolute; top: 8px; right: 8px;
      padding: .25rem .5rem;
      background: rgba(0,0,0,.7);
      border-radius: 6px;
      font-size: .68rem;
      letter-spacing: .06em;
      color: #fff;
    }
    .folder-card__body { padding: .85rem 1rem 1rem; }
    .folder-card__title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: .35rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-card__meta {
      font-size: .72rem;
      color: var(--fg-muted);
      letter-spacing: .04em;
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .folder-card__meta span::before { content: '· '; opacity: .5; margin-right: .15rem; }
    .folder-card__meta span:first-child::before { content: ''; margin: 0; }

    .folder-card__rm {
      position: absolute; top: 8px; left: 8px;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,.75); border: none; color: #fff;
      font-size: .72rem; display: grid; place-items: center;
      opacity: 0; cursor: pointer;
      z-index: 2;
    }
    .folder-card:hover .folder-card__rm { opacity: 1; }
    .folder-card__rm:hover { background: #e64545; }

    /* Photo grid (inside album) */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .75rem;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: zoom-in;
      background: var(--bg-card);
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-item__rm {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,.75); border: none; color: #fff;
      font-size: .68rem; display: grid; place-items: center;
      opacity: 0; cursor: pointer;
    }
    .gallery-item:hover .gallery-item__rm { opacity: 1; }
    .gallery-item__rm:hover { background: #e64545; }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 0;
      color: var(--fg-muted);
      font-size: .88rem;
    }

    /* ── Lightbox ── */
    .lb {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.92); backdrop-filter: blur(6px);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
    }
    .lb.open { opacity: 1; pointer-events: all; }
    .lb__stage {
      position: relative; flex: 1 1 auto; min-height: 0;
      display: grid; place-items: center;
      width: 100%; padding: 3.5rem 1rem .5rem;
    }
    .lb__img {
      max-width: min(88vw, 1100px); max-height: 100%;
      object-fit: contain; border-radius: 10px;
    }
    .lb__close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 1.1rem; display: grid; place-items: center;
      cursor: pointer;
    }
    .lb__close:hover { background: rgba(255,255,255,.22); }
    .lb__full {
      padding: .55rem 1.1rem; border-radius: 2rem;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
      color: #fff; font-size: .82rem; letter-spacing: .03em;
      cursor: pointer; font-family: inherit;
    }
    .lb__full:hover:not(:disabled) { background: rgba(255,255,255,.22); }
    .lb__full:disabled { opacity: .6; cursor: wait; }
    .lb__full[hidden] { display: none; }
    .lb__nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 1.5rem; line-height: 1;
      display: grid; place-items: center;
      cursor: pointer; user-select: none;
    }
    .lb__nav:hover { background: rgba(255,255,255,.22); }
    .lb__nav--prev { left: 1.25rem; }
    .lb__nav--next { right: 1.25rem; }
    .lb__nav[hidden] { display: none; }
    .lb__counter {
      position: absolute; top: 1.85rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.7); font-size: .8rem; letter-spacing: .08em;
    }
    @media (max-width: 600px) {
      .lb__nav--prev { left: .5rem; }
      .lb__nav--next { right: .5rem; }
    }

    /* ── Lightbox: Likes & Kommentare ── */
    .lb__bar {
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
      gap: .6rem; padding: .85rem 1rem; flex-wrap: wrap;
    }
    .lb__like, .lb__cbtn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .5rem 1rem; border-radius: 2rem;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
      color: #fff; font-size: .85rem; cursor: pointer; font-family: inherit;
      transition: background .15s, transform .1s;
    }
    .lb__like:hover, .lb__cbtn:hover { background: rgba(255,255,255,.22); }
    .lb__like:active { transform: scale(.94); }
    .lb__like.liked { background: rgba(232,69,69,.92); border-color: #e64545; }
    .lb__like.liked .lb__like-icon { fill: #fff; }
    .lb__like-count, .lb__comment-count { font-variant-numeric: tabular-nums; min-width: .6em; }

    .lb__comments {
      flex: 0 0 auto; width: min(680px, 94vw); margin: 0 auto 1rem;
      max-height: 42vh; display: flex; flex-direction: column;
      background: rgba(22,22,24,.72); border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px; overflow: hidden;
    }
    .lb__comments[hidden] { display: none; }
    .lb__comments-list {
      overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .75rem;
    }
    .lb__comment { color: #e9e9ea; font-size: .85rem; line-height: 1.45; }
    .lb__comment-head { display: flex; align-items: baseline; gap: .5rem; margin-bottom: .1rem; }
    .lb__comment-author { font-weight: 600; color: #fff; }
    .lb__comment-time { color: rgba(255,255,255,.4); font-size: .72rem; }
    .lb__comment-del {
      margin-left: auto; background: none; border: none; color: rgba(255,255,255,.4);
      cursor: pointer; font-size: .72rem; font-family: inherit; padding: 0;
    }
    .lb__comment-del:hover { color: #e64545; }
    .lb__comment-body { white-space: pre-wrap; word-break: break-word; }
    .lb__comment-empty { color: rgba(255,255,255,.5); font-size: .85rem; text-align: center; padding: .4rem; }
    .lb__comment-form {
      padding: .75rem 1rem .9rem; border-top: 1px solid rgba(255,255,255,.1);
      display: flex; flex-direction: column; gap: .5rem;
    }
    .lb__comment-form input {
      width: 100%; padding: .6rem .8rem; border-radius: 8px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      color: #fff; font-family: inherit; font-size: .85rem;
    }
    .lb__comment-form input:focus { outline: none; border-color: rgba(255,255,255,.45); }
    .lb__comment-form input::placeholder { color: rgba(255,255,255,.4); }
    .lb__comment-row { display: flex; gap: .5rem; }
    .lb__comment-row input { flex: 1; }
    .lb__comment-row button {
      padding: .6rem 1.1rem; border-radius: 8px; border: none; cursor: pointer;
      background: #fff; color: #111; font-family: inherit; font-size: .85rem; font-weight: 600;
    }
    .lb__comment-row button:hover { background: rgba(255,255,255,.85); }
    .lb__comment-row button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Password Screen ── */
    #pwScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
    }
    #pwScreen.fade-out { opacity: 0; pointer-events: none; }
    .pw-box {
      width: min(380px, 88vw);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem 2rem 2.25rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .pw-box__title {
      font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em;
      text-align: center;
    }
    .pw-box__sub {
      font-size: .78rem; color: var(--fg-muted);
      text-align: center; letter-spacing: .06em; margin-top: -.75rem;
    }
    .pw-box__input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1rem;
      color: var(--fg); font-size: 1rem; font-family: inherit;
      box-sizing: border-box;
    }
    .pw-box__input:focus { outline: none; border-color: var(--accent); }
    .pw-box__btn {
      width: 100%;
      padding: .85rem;
      border-radius: 10px;
      background: var(--accent);
      color: #fff; font-size: .95rem; font-weight: 700;
      letter-spacing: .03em; cursor: pointer;
      border: none;
    }
    .pw-box__btn:hover { background: var(--accent-2); }
    .pw-box__btn:active { transform: scale(.97); }
    .pw-box__error {
      font-size: .8rem; color: #e64545;
      text-align: center; min-height: 1.1em;
    }

    /* ── Danger button ── */
    .btn-modal--danger { background: #e64545; color: #fff; border-color: #e64545; }
    .btn-modal--danger:hover:not(:disabled) { background: #c93232; border-color: #c93232; }

    /* ── Selection overlay on gallery items ── */
    .gallery-item.selected { border-color: var(--accent); }
    .gallery-item.selected::after {
      content: '✓';
      position: absolute; inset: 0;
      background: rgba(123,94,167,.45);
      display: grid; place-items: center;
      font-size: 1.8rem; color: #fff;
      pointer-events: none;
    }
    .selection-mode .gallery-item { cursor: pointer; }

    /* ── Selection action bar ── */
    #selectionBar {
      position: fixed;
      bottom: 1.5rem;
      left: calc(64px + 1.5rem);
      right: 1.5rem;
      z-index: 500;
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.25rem;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      flex-wrap: wrap;
    }
    #selectionCount { flex: 1; font-size: .85rem; color: var(--fg-muted); }

    /* ── Album header action buttons ── */
    .gallery-section__actions {
      display: flex; align-items: center; gap: .5rem;
    }
    .gallery-section__actions[hidden] { display: none !important; }
    .btn-gallery-action {
      padding: .4rem .9rem;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--fg-muted);
    }
    .btn-gallery-action:hover { color: var(--fg); border-color: var(--fg-muted); }
    .btn-gallery-action--primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-gallery-action--primary:hover { background: var(--accent-2); border-color: var(--accent-2); }

    /* ── Move album list ── */
    #moveAlbumList { max-height: 50vh; overflow-y: auto; margin-top: .5rem; }
    .move-album-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .85rem;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .move-album-item:hover { background: rgba(0,0,0,.04); border-color: var(--border); }
    .move-album-item__thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: var(--bg-card); flex-shrink: 0;
    }
    .move-album-item__name { font-size: .92rem; font-weight: 600; }
  </style>
</head>
<body>

  <a href="index.html" class="upload-page__back">
    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="10 3 5 8 10 13"/>
    </svg>
    Zurück
  </a>

  <main class="upload-page">

    <button class="upload-btn" id="uploadBtn" type="button">
      <div class="upload-btn__icon">
        <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M32 44 V20 M20 32 L32 20 L44 32"/>
          <path d="M12 44 v6 a4 4 0 0 0 4 4 h32 a4 4 0 0 0 4-4 v-6"/>
        </svg>
      </div>
      <span class="upload-btn__label">UPLOAD</span>
      <span class="upload-btn__sub">Neues Album erstellen</span>
    </button>

    <p class="status" id="status"></p>

    <!-- Gallery (folders or album view) -->
    <section class="gallery-section">
      <div class="gallery-section__head">
        <div class="gallery-section__title-wrap">
          <button class="gallery-section__back-album" id="backToFolders" hidden>← Zurück</button>
          <div>
            <span class="gallery-section__title" id="gallerySectionTitle">Alben</span>
            <span class="gallery-section__sub" id="gallerySectionSub">Galerie</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span class="gallery-section__count" id="galleryCount"></span>
          <div class="gallery-section__actions" id="folderActions">
            <button class="btn-gallery-action btn-gallery-action--primary" id="newAlbumBtn" type="button">+ Neues Album</button>
            <button class="btn-gallery-action" id="optimizeBtn" type="button" title="Erzeugt verkleinerte Vorschau-Versionen für ältere Uploads">Bilder optimieren</button>

    // ── Helpers ──
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className   = 'status ' + type;
      if (msg) setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, 4500);
    }

    function slugify(s) {
      return (s || 'album')
        .toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40)
        || 'album';
    }

    // Read an album's _meta.json via download() — bypasses the public CDN
    // cache (which ignores ?t= cache-busters), so edits are seen immediately.
    async function loadAlbumMeta(folder) {
      try {
        const { data, error } = await db.storage.from(BUCKET).download(`${folder}/_meta.json`);
        if (!error && data) return JSON.parse(await data.text());
      } catch (e) {}
      // Fallback to public URL if download is unavailable
      try {
        const { data: mu } = db.storage.from(BUCKET).getPublicUrl(`${folder}/_meta.json`);
        const r = await fetch(mu.publicUrl + '?t=' + Date.now(), { cache: 'no-store' });
        if (r.ok) return await r.json();
      } catch (e) {}
      return null;
    }

    // List every entry in a folder, paginating past the 100/1000-per-request
    // limits so large albums (e.g. 500+ photos) are counted/loaded in full.
    async function listAllInFolder(folder) {
      const all = [];
      const pageSize = 1000;
      let offset = 0;
      while (true) {
        const { data, error } = await db.storage.from(BUCKET).list(folder, { limit: pageSize, offset });
        if (error || !data || !data.length) break;
        all.push(...data);
        if (data.length < pageSize) break;
        offset += pageSize;
      }
      return all;
    }

    // Write an album's _meta.json with no-cache so reads stay fresh.
    async function saveAlbumMeta(folder, meta) {
      const blob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
      return db.storage
        .from(BUCKET)
        .upload(`${folder}/_meta.json`, blob, { contentType: 'application/json', cacheControl: '0', upsert: true });
    }

    function formatDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${d}.${m}.${y}`;
    }

    // ── Verkleinerte Bildversionen (thumbs = Raster, display = Lightbox) ──
    // Pro Foto liegen neben dem Original zwei JPEGs in Unterordnern:
    //   <album>/thumbs/<datei>.jpg   (~480px, fürs Raster & Cover)
    //   <album>/display/<datei>.jpg  (~1600px, für die Großansicht)
    // Das Original bleibt unangetastet und ist über den Lightbox-Button abrufbar.
    const THUMB_DIR   = 'thumbs';
    const DISPLAY_DIR = 'display';
    const THUMB_MAX   = 480,  THUMB_Q   = 0.8;
    const DISPLAY_MAX = 1600, DISPLAY_Q = 0.85;

    function publicUrl(path) {
      return db.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
    }
    function thumbPath(folder, name)   { return `${folder}/${THUMB_DIR}/${name}.jpg`; }
    function displayPath(folder, name) { return `${folder}/${DISPLAY_DIR}/${name}.jpg`; }

    async function resizeToJpeg(blob, maxDim, quality) {
      const bmp = await createImageBitmap(blob, { imageOrientation: 'from-image' });
      const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
      const w = Math.max(1, Math.round(bmp.width * scale));
      const h = Math.max(1, Math.round(bmp.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(bmp, 0, 0, w, h);
      bmp.close();
      return new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
    }

    // Erzeugt thumb + display für ein Original und lädt beide hoch.
    // Fehler sind unkritisch: ohne abgeleitete Version greift der
    // onerror-Fallback im <img> auf das Original zurück.
    async function uploadDerived(folder, name, blob) {
      try {
        const [t, d] = await Promise.all([
          resizeToJpeg(blob, THUMB_MAX, THUMB_Q),
          resizeToJpeg(blob, DISPLAY_MAX, DISPLAY_Q),
        ]);
        const jobs = [];
        if (t) jobs.push(db.storage.from(BUCKET).upload(thumbPath(folder, name), t, { contentType: 'image/jpeg', upsert: true }));
        if (d) jobs.push(db.storage.from(BUCKET).upload(displayPath(folder, name), d, { contentType: 'image/jpeg', upsert: true }));
        await Promise.all(jobs);
        return !!(t && d);
      } catch (e) {
        console.warn('Vorschau-Erzeugung fehlgeschlagen:', name, e);
        return false;
      }
    }

    // Löscht die abgeleiteten Versionen zu Original-Pfaden (best effort).
    function removeDerivedFor(paths) {
      const derived = [];
      for (const p of paths) {
        const idx = p.lastIndexOf('/');
        if (idx < 0) continue; // Legacy-Datei im Root → keine abgeleiteten Versionen
        const folder = p.slice(0, idx), name = p.slice(idx + 1);
        derived.push(thumbPath(folder, name), displayPath(folder, name));
      }
      if (derived.length) db.storage.from(BUCKET).remove(derived).catch(() => {});
    }

    // remove() in 100er-Blöcken, damit auch sehr große Alben sauber gelöscht werden.
    async function removePaths(paths) {
      for (let i = 0; i < paths.length; i += 100) {
        const { error } = await db.storage.from(BUCKET).remove(paths.slice(i, i + 100));
        if (error) return error;
      }
      return null;
    }

    // ── Confirm Modal ──
    function showConfirm(title, msg, okText = 'Löschen') {
      return new Promise(resolve => {
        confirmTitle.textContent = title;
        confirmMsg.textContent   = msg;
        confirmOk.textContent    = okText;
        confirmModal.classList.add('open');
        confirmModal.setAttribute('aria-hidden', 'false');
        function ok()  { cleanup(); resolve(true);  }
        function no()  { cleanup(); resolve(false); }
        function cleanup() {
          confirmOk.removeEventListener('click', ok);
          confirmCancel.removeEventListener('click', no);
          confirmClose.removeEventListener('click', no);
          confirmModal.classList.remove('open');
          confirmModal.setAttribute('aria-hidden', 'true');
        }
        confirmOk.addEventListener('click', ok);
        confirmCancel.addEventListener('click', no);
        confirmClose.addEventListener('click', no);
      });
    }
    confirmModal.addEventListener('click', e => { if (e.target === confirmModal) confirmCancel.click(); });

    // ── Selection mode ──
    function enterSelectMode() {
      isSelectMode = true;
      galleryGrid.classList.add('selection-mode');
      selectionBar.hidden = false;
      addImagesBtn.hidden = true;
      selectModeBtn.textContent = 'Abbrechen';
      selectionCount.textContent = '0 ausgewählt';
    }

    function exitSelectMode() {
      isSelectMode = false;
      selectedPaths.clear();
      galleryGrid.classList.remove('selection-mode');
      selectionBar.hidden = true;
      addImagesBtn.hidden = false;
      selectModeBtn.textContent = 'Auswählen';
      galleryGrid.querySelectorAll('.gallery-item.selected').forEach(el => el.classList.remove('selected'));
    }

    selectModeBtn.addEventListener('click', () => {
      if (isSelectMode) exitSelectMode();
      else              enterSelectMode();
    });

    // ── Add images to existing album ──
    addImagesBtn.addEventListener('click', () => addImagesInput.click());
    addImagesInput.addEventListener('change', async () => {
      const files = Array.from(addImagesInput.files).filter(f => f.type.startsWith('image/'));
      addImagesInput.value = '';
      if (!files.length || !currentFolder) return;

      addImagesBtn.disabled = true;
      addImagesBtn.textContent = 'Lädt…';
      let ok = 0, fail = 0;
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const safeName = `${Date.now()}-${i}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error } = await db.storage
          .from(BUCKET)
          .upload(`${currentFolder}/${safeName}`, file, { contentType: file.type, upsert: false });
        if (error) { fail++; console.error(error); }
        else { ok++; await uploadDerived(currentFolder, safeName, file); }
      }
      addImagesBtn.disabled = false;
      addImagesBtn.textContent = '+ Bilder hinzufügen';
      if (fail === 0) setStatus(`${ok} Bild${ok > 1 ? 'er' : ''} hinzugefügt ✓`, 'ok');
      else            setStatus(`${ok} hochgeladen, ${fail} fehlgeschlagen`, 'error');
      await openAlbum(currentFolder);
    });

    // ── Delete selected ──
    deleteSelectedBtn.addEventListener('click', async () => {
      const n = selectedPaths.size;
      if (!n) return;
      const confirmed = await showConfirm(
        `${n} Bild${n > 1 ? 'er' : ''} löschen`,
        `Sollen ${n} Bild${n > 1 ? 'er' : ''} wirklich dauerhaft gelöscht werden? Diese Aktion kann nicht rückgängig gemacht werden.`
      );
      if (!confirmed) return;
      const paths = [...selectedPaths];
      const error = await removePaths(paths);
      if (error) { setStatus('Löschen fehlgeschlagen: ' + error.message, 'error'); return; }
      removeDerivedFor(paths);
      exitSelectMode();
      setStatus(`${n} Bild${n > 1 ? 'er' : ''} gelöscht`, 'ok');
      await openAlbum(currentFolder);
    });

    // ── Move selected ──
    moveSelectedBtn.addEventListener('click', async () => {
      if (!selectedPaths.size) return;
      moveAlbumList.innerHTML = '<p style="color:var(--fg-muted);font-size:.85rem;padding:.5rem .85rem">Lade Alben…</p>';
      moveModal.classList.add('open');
      moveModal.setAttribute('aria-hidden', 'false');

      const { data } = await db.storage.from(BUCKET).list('', { limit: 200 });
      const folders = (data || [])
        .filter(e => e && e.name && e.id === null && e.name !== currentFolder)
        .map(e => e.name);

      if (!folders.length) {
        moveAlbumList.innerHTML = '<p style="color:var(--fg-muted);font-size:.85rem;padding:.5rem .85rem">Keine anderen Alben vorhanden.</p>';
        return;
      }

      const items = await Promise.all(folders.map(async folder => {
        const { data: sub } = await db.storage.from(BUCKET).list(folder, { limit: 10 });
        const photos = (sub || []).filter(f => f.name && f.name !== '_meta.json' && f.id);
        let name = folder;
        if ((sub || []).some(f => f.name === '_meta.json')) {
          const m = await loadAlbumMeta(folder);
          if (m) name = m.name || folder;
        }
        const cover      = photos[0] ? publicUrl(`${folder}/${photos[0].name}`) : null;
        const coverThumb = photos[0] ? publicUrl(thumbPath(folder, photos[0].name)) : null;
        return { folder, name, cover, coverThumb };
      }));

      moveAlbumList.innerHTML = '';
      items.forEach(({ folder, name, cover, coverThumb }) => {
        const el = document.createElement('div');
        el.className = 'move-album-item';
        el.innerHTML = cover
          ? `<img class="move-album-item__thumb" src="${coverThumb}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${cover}'"><span class="move-album-item__name">${name}</span>`
          : `<div class="move-album-item__thumb"></div><span class="move-album-item__name">${name}</span>`;
        el.addEventListener('click', () => doMoveImages(folder));
        moveAlbumList.appendChild(el);
      });
    });

    async function doMoveImages(targetFolder) {
      closeMoveModal();
      const paths = [...selectedPaths];
      const n = paths.length;
      setStatus('Verschiebe Bilder…', '');
      let ok = 0, fail = 0;

      for (const srcPath of paths) {
        const fileName = srcPath.split('/').pop();
        const { data: dlData, error: dlErr } = await db.storage.from(BUCKET).download(srcPath);
        if (dlErr || !dlData) { fail++; console.error('Download fehlgeschlagen', srcPath, dlErr); continue; }
        try {
          const { error: upErr } = await db.storage
            .from(BUCKET)
            .upload(`${targetFolder}/${fileName}`, dlData, { contentType: dlData.type, upsert: true });
          if (upErr) { fail++; console.error('Upload fehlgeschlagen', upErr); continue; }
          // Verkleinerte Versionen am Ziel neu erzeugen, alte am Quellort entfernen
          await uploadDerived(targetFolder, fileName, dlData);
          const { error: rmErr } = await db.storage.from(BUCKET).remove([srcPath]);
          if (rmErr) console.error('Löschen aus Quellalbum fehlgeschlagen', srcPath, rmErr);
          removeDerivedFor([srcPath]);
          ok++;
        } catch (e) { fail++; console.error(e); }
      }

      exitSelectMode();
      if (fail === 0) setStatus(`${ok} Bild${ok > 1 ? 'er' : ''} verschoben ✓`, 'ok');
      else            setStatus(`${ok} verschoben, ${fail} fehlgeschlagen`, 'error');
      await openAlbum(currentFolder);
    }

    function closeMoveModal() {
      moveModal.classList.remove('open');
      moveModal.setAttribute('aria-hidden', 'true');
      document.getElementById('newAlbumRow').style.display = 'none';
      document.getElementById('newAlbumNameInput').value = '';
      document.getElementById('newAlbumDateFrom').value = '';
      document.getElementById('newAlbumDateTo').value = '';
      document.getElementById('newAlbumLocationInput').value = '';
    }
    moveCancel.addEventListener('click', closeMoveModal);
    moveClose.addEventListener('click', closeMoveModal);

    // ── Neues Album erstellen & verschieben ──
    document.getElementById('moveNewAlbumBtn').addEventListener('click', () => {
      const row = document.getElementById('newAlbumRow');
      row.style.display = row.style.display === 'none' ? 'flex' : 'none';
      if (row.style.display === 'flex') {
        setTimeout(() => document.getElementById('newAlbumNameInput').focus(), 50);
      }
    });

    document.getElementById('newAlbumConfirm').addEventListener('click', async () => {
      const name     = document.getElementById('newAlbumNameInput').value.trim();
      const dateFrom = document.getElementById('newAlbumDateFrom').value;
      const dateTo   = document.getElementById('newAlbumDateTo').value;
      const location = document.getElementById('newAlbumLocationInput').value.trim();
      if (!name) { document.getElementById('newAlbumNameInput').focus(); return; }

      const btn = document.getElementById('newAlbumConfirm');
      btn.disabled = true;
      btn.textContent = 'Erstelle Album…';

      const folderId = `${slugify(name)}-${Date.now()}`;
      const meta = { name, dateFrom, dateTo, location, created_at: new Date().toISOString() };

      const { error: metaErr } = await saveAlbumMeta(folderId, meta);

      if (metaErr) {
        setStatus('Fehler beim Erstellen: ' + metaErr.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Album erstellen & verschieben';
        return;
      }

      closeMoveModal();
      await doMoveImages(folderId);
    });
    moveModal.addEventListener('click', e => { if (e.target === moveModal) closeMoveModal(); });

    // ── Edit Album ──
    const editAlbumModal  = document.getElementById('editAlbumModal');
    const editAlbumClose  = document.getElementById('editAlbumClose');
    const editAlbumCancel = document.getElementById('editAlbumCancel');
    const editAlbumSave   = document.getElementById('editAlbumSave');

    function closeEditAlbumModal() {
      editAlbumModal.classList.remove('open');
      editAlbumModal.setAttribute('aria-hidden', 'true');
    }
    editAlbumClose.addEventListener('click', closeEditAlbumModal);
    editAlbumCancel.addEventListener('click', closeEditAlbumModal);
    editAlbumModal.addEventListener('click', e => { if (e.target === editAlbumModal) closeEditAlbumModal(); });

    document.getElementById('editAlbumBtn').addEventListener('click', async () => {
      if (!currentFolder) return;
      // Load current meta
      let meta = { name: currentFolder, dateFrom: '', dateTo: '', date: '', location: '' };
      const loaded = await loadAlbumMeta(currentFolder);
      if (loaded) meta = { ...meta, ...loaded };

      document.getElementById('editAlbumName').value     = meta.name || '';
      document.getElementById('editAlbumDateFrom').value = meta.dateFrom || meta.date || '';
      document.getElementById('editAlbumDateTo').value   = meta.dateTo || '';
      document.getElementById('editAlbumLocation').value = meta.location || '';

      editAlbumModal.classList.add('open');
      editAlbumModal.setAttribute('aria-hidden', 'false');
      setTimeout(() => document.getElementById('editAlbumName').focus(), 150);
    });

    editAlbumSave.addEventListener('click', async () => {
      const folder   = currentFolder; // capture immediately — currentFolder must not change during async ops
      const name     = document.getElementById('editAlbumName').value.trim();
      const dateFrom = document.getElementById('editAlbumDateFrom').value;
      const dateTo   = document.getElementById('editAlbumDateTo').value;
      const location = document.getElementById('editAlbumLocation').value.trim();

      if (!name || !folder) { document.getElementById('editAlbumName').focus(); return; }

      editAlbumSave.disabled = true;
      editAlbumSave.textContent = 'Speichert…';

      console.log('[Album bearbeiten] Schreibe Metadaten in bestehenden Ordner:', folder, '→', `${folder}/_meta.json`);

      // Safety: confirm the target folder already exists in storage. This makes it
      // impossible for an edit to silently land in a brand-new folder.
      const { data: existingItems, error: listErr } = await db.storage.from(BUCKET).list(folder, { limit: 1 });
      if (listErr || !existingItems || existingItems.length === 0) {
        editAlbumSave.disabled = false;
        editAlbumSave.textContent = 'Speichern';
        setStatus('Album-Ordner nicht gefunden – Abbruch (es wird kein neues Album erstellt).', 'error');
        console.error('[Album bearbeiten] Zielordner existiert nicht:', folder, listErr);
        return;
      }

      // Load existing meta to preserve created_at etc., then overwrite IN PLACE.
      const existing = (await loadAlbumMeta(folder)) || {};
      const meta = { ...existing, name, dateFrom, dateTo, location };

      // Overwrite the same _meta.json: try update() (existing object), then upsert upload().
      const blob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
      let { error } = await db.storage
        .from(BUCKET)
        .update(`${folder}/_meta.json`, blob, { contentType: 'application/json', cacheControl: '0', upsert: true });
      if (error) {
        const up = await db.storage
          .from(BUCKET)
          .upload(`${folder}/_meta.json`, blob, { contentType: 'application/json', cacheControl: '0', upsert: true });
        error = up.error;
      }

      editAlbumSave.disabled = false;
      editAlbumSave.textContent = 'Speichern';

      if (error) { setStatus('Fehler: ' + error.message, 'error'); console.error(error); return; }

      closeEditAlbumModal();
      setStatus('Album aktualisiert ✓', 'ok');

      // Refresh the open album view from storage so the change is visibly applied.
      await openAlbum(folder);
    });

    // ── Upload Modal ──
    function openModal() {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      fAlbumName.value = '';
      fAlbumDateFrom.value = new Date().toISOString().slice(0, 10);
      fAlbumDateTo.value   = '';
      fAlbumLoc.value  = '';
      fAlbumFiles.value = '';
      pendingFiles = [];
      fileCount.textContent = '';
      progressBar.hidden = true;
      progressFill.style.width = '0';
      modalSave.disabled = false;
      modalSave.textContent = 'Album erstellen';
      setTimeout(() => fAlbumName.focus(), 250);
    }
    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    uploadBtn.addEventListener('click', openModal);
    document.getElementById('newAlbumBtn').addEventListener('click', openModal);
    document.getElementById('selectFolderModeBtn').addEventListener('click', () => {
      folderGrid.classList.toggle('selection-mode');
      const active = folderGrid.classList.contains('selection-mode');
      document.getElementById('selectFolderModeBtn').textContent = active ? 'Abbrechen' : 'Auswählen';
    });
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // File picker
    fAlbumFiles.addEventListener('change', () => {
      pendingFiles = Array.from(fAlbumFiles.files).filter(f => f.type.startsWith('image/'));
      fileCount.textContent = pendingFiles.length
        ? `${pendingFiles.length} Bild${pendingFiles.length > 1 ? 'er' : ''} ausgewählt`
        : '';
    });
    fileDrop.addEventListener('dragover',  e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      const dropped = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (!dropped.length) return;
      pendingFiles = pendingFiles.concat(dropped);
      fileCount.textContent = `${pendingFiles.length} Bild${pendingFiles.length > 1 ? 'er' : ''} ausgewählt`;
    });

    // Save album
    modalSave.addEventListener('click', async () => {
      const name = fAlbumName.value.trim();
      const dateFrom = fAlbumDateFrom.value;
      const dateTo   = fAlbumDateTo.value;
      const loc      = fAlbumLoc.value.trim();

      if (!name) { fAlbumName.focus(); return; }
      if (!pendingFiles.length) { fileDrop.click(); return; }

      modalSave.disabled = true;
      modalSave.textContent = 'Lädt…';
      progressBar.hidden = false;

      const folderId = `${slugify(name)}-${Date.now()}`;
      const meta = { name, dateFrom, dateTo, location: loc, created_at: new Date().toISOString() };

      // Upload meta
      const { error: metaErr } = await saveAlbumMeta(folderId, meta);
      if (metaErr) {
        console.error(metaErr);
        setStatus('Fehler beim Speichern der Album-Daten: ' + metaErr.message, 'error');
        modalSave.disabled = false;
        modalSave.textContent = 'Album erstellen';
        return;
      }

      // Upload files
      let ok = 0, fail = 0;
      for (let i = 0; i < pendingFiles.length; i++) {
        const file = pendingFiles[i];
        const safeName = `${Date.now()}-${i}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error } = await db.storage
          .from(BUCKET)
          .upload(`${folderId}/${safeName}`, file, { contentType: file.type, upsert: false });
        if (error) { fail++; console.error(error); }
        else { ok++; await uploadDerived(folderId, safeName, file); }
        progressFill.style.width = `${((i + 1) / pendingFiles.length) * 100}%`;
      }

      closeModal();
      if (fail === 0) setStatus(`Album "${name}" erstellt — ${ok} Bild${ok > 1 ? 'er' : ''} hochgeladen ✓`, 'ok');
      else            setStatus(`Album erstellt: ${ok} hochgeladen, ${fail} fehlgeschlagen`, 'error');

      await loadFolders();
    });

    // ── Load folder list ──
    async function loadFolders() {
      currentFolder = null;
      exitSelectMode();
      folderActions.hidden = false;
      albumActions.hidden = true;
      backBtn.hidden = true;
      sectionTitle.textContent = 'Alben';
      sectionSub.textContent   = 'Galerie';
      folderGrid.style.display = '';
      galleryGrid.style.display = 'none';
      selectionBar.hidden = true;
      folderGrid.innerHTML = '<p class="gallery-empty">Lade Alben…</p>';

      const { data, error } = await db.storage.from(BUCKET).list('', { limit: 200 });
      if (error) {
        folderGrid.innerHTML = `<p class="gallery-empty" style="color:#e64545">Ladefehler: ${error.message}</p>`;
        return;
      }

      // Folder entries from list() come back with id=null
      const folderNames = (data || [])
        .filter(e => e && e.name && e.id === null)
        .map(e => e.name);

      // Also handle legacy: files at root (uploaded before albums existed)
      const legacyFiles = (data || []).filter(e => e && e.id && e.name && e.name !== '.emptyFolderPlaceholder');

      sectionCount.textContent = folderNames.length
        ? `${folderNames.length} Album${folderNames.length > 1 ? 'en' : ''}`
        : '';

      if (!folderNames.length && !legacyFiles.length) {
        folderGrid.innerHTML = '<p class="gallery-empty">Noch keine Alben. Klicke auf UPLOAD um zu starten.</p>';
        return;
      }

      // Fetch meta + first image per folder
      const cards = await Promise.all(folderNames.map(async folder => {
        const items = await listAllInFolder(folder);
        const photos = items.filter(f => f.name && f.name !== '_meta.json' && f.id);
        // Always load meta directly — _meta.json may sort past the first page
        // of a large album's listing, so we must not gate on it appearing there.
        let meta = { name: folder, date: '', location: '' };
        const m = await loadAlbumMeta(folder);
        if (m) meta = { ...meta, ...m };
        const cover      = photos[0] ? publicUrl(`${folder}/${photos[0].name}`) : null;
        const coverThumb = photos[0] ? publicUrl(thumbPath(folder, photos[0].name)) : null;
        return { folder, meta, count: photos.length, cover, coverThumb };
      }));

      // Sort: newest by meta.created_at desc
      cards.sort((a, b) => (b.meta.created_at || '').localeCompare(a.meta.created_at || ''));

      folderGrid.innerHTML = '';

      cards.forEach(c => {
        const card = document.createElement('div');
        card.className = 'folder-card';
        card.dataset.folder = c.folder;
        card.innerHTML = `
          <button class="folder-card__rm" data-action="rm-folder" aria-label="Album löschen">✕</button>
          <div class="folder-card__cover">
            ${c.cover ? `<img src="${c.coverThumb}" alt="" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${c.cover}'">` : '<div class="folder-card__cover-placeholder">⌑</div>'}
            <span class="folder-card__count-badge">${c.count} Foto${c.count !== 1 ? 's' : ''}</span>
          </div>
          <div class="folder-card__body">
            <div class="folder-card__title">${c.meta.name || c.folder}</div>
            <div class="folder-card__meta">
              ${c.meta.dateFrom ? `<span>${formatDate(c.meta.dateFrom)}${c.meta.dateTo ? ' – ' + formatDate(c.meta.dateTo) : ''}</span>` : (c.meta.date ? `<span>${formatDate(c.meta.date)}</span>` : '')}
              ${c.meta.location ? `<span>${c.meta.location}</span>` : ''}
            </div>
          </div>
        `;
        folderGrid.appendChild(card);
      });

      if (legacyFiles.length) {
        const legacy = document.createElement('div');
        legacy.className = 'folder-card';
        legacy.dataset.folder = '__legacy__';
        const legacyCover = db.storage.from(BUCKET).getPublicUrl(legacyFiles[0].name).data.publicUrl;
        legacy.innerHTML = `
          <div class="folder-card__cover">
            <img src="${legacyCover}" alt="" loading="lazy">
            <span class="folder-card__count-badge">${legacyFiles.length} Foto${legacyFiles.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="folder-card__body">
            <div class="folder-card__title">Ohne Album</div>
            <div class="folder-card__meta"><span>Ältere Uploads</span></div>
          </div>
        `;
        folderGrid.appendChild(legacy);
      }
    }

    // ── Open album ──
    async function openAlbum(folder) {
      currentFolder = folder;
      folderGrid.style.display = 'none';
      galleryGrid.style.display = '';
      backBtn.hidden = false;
      folderActions.hidden = true;
      albumActions.hidden = false;
      galleryGrid.innerHTML = '<p class="gallery-empty">Lade Bilder…</p>';

      let files, metaText = '';
      if (folder === '__legacy__') {
        const { data } = await db.storage.from(BUCKET).list('', { limit: 200 });
        files = (data || [])
          .filter(f => f && f.id && f.name && f.name !== '.emptyFolderPlaceholder')
          .map(f => ({ name: f.name, fullPath: f.name }));
        sectionTitle.textContent = 'Ohne Album';
        sectionSub.textContent = 'Ältere Uploads';
      } else {
        const data = await listAllInFolder(folder);
        files = (data || [])
          .filter(f => f.name && f.name !== '_meta.json' && f.id)
          .map(f => ({ name: f.name, fullPath: `${folder}/${f.name}` }));

        // Try to load meta
        const meta = await loadAlbumMeta(folder);
        if (meta) {
          sectionTitle.textContent = meta.name || folder;
          const parts = [];
          if (meta.dateFrom) parts.push(formatDate(meta.dateFrom) + (meta.dateTo ? ' – ' + formatDate(meta.dateTo) : ''));
          else if (meta.date) parts.push(formatDate(meta.date));
          if (meta.location) parts.push(meta.location);
          metaText = parts.join(' · ');
        } else {
          sectionTitle.textContent = folder;
        }
        sectionSub.textContent = metaText || 'Album';
      }

      sectionCount.textContent = files.length
        ? `${files.length} Bild${files.length > 1 ? 'er' : ''}`
        : '';

      if (!files.length) {
        galleryGrid.innerHTML = '<p class="gallery-empty">Album ist leer.</p>';
        return;
      }

      galleryGrid.innerHTML = '';
      const isLegacy = folder === '__legacy__';
      files.forEach((file, i) => {
        const url   = publicUrl(file.fullPath);
        const thumb = isLegacy ? url : publicUrl(thumbPath(folder, file.name));
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.dataset.path    = file.fullPath;
        div.dataset.url     = url;
        div.dataset.display = isLegacy ? url : publicUrl(displayPath(folder, file.name));
        div.innerHTML = `<img src="${thumb}" alt="" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${url}'">
                         <button class="gallery-item__rm" aria-label="Löschen">✕</button>`;
        galleryGrid.appendChild(div);
      });
    }

    // ── Folder grid clicks ──
    folderGrid.addEventListener('click', async e => {
      const rmBtn = e.target.closest('[data-action="rm-folder"]');
      if (rmBtn) {
        e.stopPropagation();
        const card = rmBtn.closest('.folder-card');
        const folder = card.dataset.folder;
        const albumName = card.querySelector('.folder-card__title').textContent;
        const confirmed = await showConfirm(
          `Album löschen`,
          `Album "${albumName}" inkl. aller Bilder wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`
        );
        if (!confirmed) return;
        const paths = [];
        // Abgeleitete Versionen zuerst, dann Originale + _meta.json
        for (const sub of [`${folder}/${THUMB_DIR}`, `${folder}/${DISPLAY_DIR}`]) {
          (await listAllInFolder(sub)).forEach(f => { if (f.id) paths.push(`${sub}/${f.name}`); });
        }
        (await listAllInFolder(folder)).forEach(f => { if (f.id) paths.push(`${folder}/${f.name}`); });
        if (paths.length) {
          const rmErr = await removePaths(paths);
          if (rmErr) { setStatus('Löschen fehlgeschlagen: ' + rmErr.message, 'error'); return; }
        }
        setStatus('Album gelöscht', 'ok');
        await loadFolders();
        return;
      }
      const card = e.target.closest('.folder-card');
      if (card) openAlbum(card.dataset.folder);
    });

    // ── Album grid clicks ──
    galleryGrid.addEventListener('click', async e => {
      const item  = e.target.closest('.gallery-item');
      const rmBtn = e.target.closest('.gallery-item__rm');
      const img   = e.target.closest('.gallery-item img');

      if (isSelectMode) {
        if (!item) return;
        const path = item.dataset.path;
        if (selectedPaths.has(path)) { selectedPaths.delete(path); item.classList.remove('selected'); }
        else                          { selectedPaths.add(path);    item.classList.add('selected'); }
        selectionCount.textContent = `${selectedPaths.size} ausgewählt`;
        return;
      }

      if (rmBtn) {
        e.stopPropagation();
        const path = rmBtn.closest('.gallery-item').dataset.path;
        const confirmed = await showConfirm('Bild löschen', 'Dieses Bild wirklich dauerhaft löschen?');
        if (!confirmed) return;
        const { error } = await db.storage.from(BUCKET).remove([path]);
        if (error) { setStatus('Löschen fehlgeschlagen', 'error'); return; }
        removeDerivedFor([path]);
        await openAlbum(currentFolder);
      } else if (img) {
        openLightboxFromItem(img.closest('.gallery-item'));
      }
    });

    backBtn.addEventListener('click', loadFolders);

    // ── Lightbox ──
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb || e.target.id === 'lbStage') closeLb(); });
    document.addEventListener('keydown', e => {
      if (lb.classList.contains('open')) {
        const typing = e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA');
        if (e.key === 'Escape')     return closeLb();
        if (typing) return;
        if (e.key === 'ArrowLeft')  return lbStep(-1);
        if (e.key === 'ArrowRight') return lbStep(1);
        return;
      }
      if (e.key !== 'Escape') return;
      if (confirmModal.classList.contains('open')) return confirmCancel.click();
      if (moveModal.classList.contains('open'))    return closeMoveModal();
      if (modal.classList.contains('open'))        return closeModal();
    });
    function closeLb() {
      lb.classList.remove('open');
      lb.setAttribute('aria-hidden', 'true');
      lbImg.onerror = null;
      lbImg.onload  = null;
      lbImg.src = '';
      lbFullBtn.hidden = true;
      lbComments.hidden = true;
      lbItems = [];
      lbIndex = -1;
      socialPath = null;
    }

    // Lightbox zeigt zuerst die Display-Version (~1600px); der Button
    // lädt auf Wunsch das unveränderte Original nach. Mit den Pfeilen
    // (Buttons, Tastatur, Wischgeste) springt man direkt zum nächsten Foto.
    const lbFullBtn = document.getElementById('lbFullBtn');
    const lbPrev    = document.getElementById('lbPrev');
    const lbNext    = document.getElementById('lbNext');
    const lbCounter = document.getElementById('lbCounter');
    let lbFullUrl = null;
    let lbItems = [];   // [{ display, full }] — alle Fotos des offenen Albums
    let lbIndex = -1;

    function openLightboxFromItem(el) {
      const items = [...galleryGrid.querySelectorAll('.gallery-item')];
      lbItems = items.map(it => ({
        display: it.dataset.display || it.dataset.url,
        full:    it.dataset.url,
        path:    it.dataset.path,
      }));
      lbIndex = items.indexOf(el);
      if (lbIndex < 0) lbIndex = 0;
      showLbImage();
      lb.classList.add('open');
      lb.setAttribute('aria-hidden', 'false');
    }

    function showLbImage() {
      const { display, full } = lbItems[lbIndex];
      lbFullUrl = full;
      lbImg.onload = null;
      // Keine Display-Version vorhanden (z.B. noch nicht optimiert) → Original zeigen
      lbImg.onerror = () => { lbImg.onerror = null; lbImg.src = full; lbFullBtn.hidden = true; };
      lbImg.src = display;
      lbFullBtn.hidden = display === full;
      lbFullBtn.disabled = false;
      lbFullBtn.textContent = 'Volle Auflösung anzeigen';

      const many = lbItems.length > 1;
      lbPrev.hidden = !many;
      lbNext.hidden = !many;
      lbCounter.textContent = many ? `${lbIndex + 1} / ${lbItems.length}` : '';

      // Nachbarbilder vorladen, damit das Blättern flüssig wirkt
      if (many) {
        for (const d of [1, -1]) {
          const n = (lbIndex + d + lbItems.length) % lbItems.length;
          new Image().src = lbItems[n].display;
        }
      }

      refreshSocial(lbItems[lbIndex].path);
    }

    function lbStep(dir) {
      if (!lbItems.length) return;
      lbIndex = (lbIndex + dir + lbItems.length) % lbItems.length;
      showLbImage();
    }

    lbPrev.addEventListener('click', e => { e.stopPropagation(); lbStep(-1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); lbStep(1); });

    // Wischgeste (Touch): horizontal > 40px und überwiegend horizontal
    let lbTouchX = null, lbTouchY = null;
    lb.addEventListener('touchstart', e => {
      lbTouchX = e.touches[0].clientX;
      lbTouchY = e.touches[0].clientY;
    }, { passive: true });
    lb.addEventListener('touchend', e => {
      if (lbTouchX === null) return;
      const dx = e.changedTouches[0].clientX - lbTouchX;
      const dy = e.changedTouches[0].clientY - lbTouchY;
      lbTouchX = lbTouchY = null;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) lbStep(dx < 0 ? 1 : -1);
    }, { passive: true });

    lbFullBtn.addEventListener('click', () => {
      if (!lbFullUrl) return;
      lbFullBtn.disabled = true;
      lbFullBtn.textContent = 'Lädt…';
      lbImg.onerror = null;
      lbImg.onload = () => { lbImg.onload = null; lbFullBtn.hidden = true; };
      lbImg.src = lbFullUrl;
    });

    // ── Likes & Kommentare ──
    // Likes/Kommentare liegen in Supabase (Tabellen image_likes, image_comments)
    // und sind pro Bild über den Storage-Pfad (data-path) verknüpft.
    const CLIENT_ID = (() => {
      let id = localStorage.getItem('gallery-client-id');
      if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()); localStorage.setItem('gallery-client-id', id); }
      return id;
    })();

    const lbLike          = document.getElementById('lbLike');
    const lbLikeCount     = document.getElementById('lbLikeCount');
    const lbCommentToggle = document.getElementById('lbCommentToggle');
    const lbCommentCount  = document.getElementById('lbCommentCount');
    const lbComments      = document.getElementById('lbComments');
    const lbCommentsList  = document.getElementById('lbCommentsList');
    const lbCommentForm   = document.getElementById('lbCommentForm');
    const lbCommentName   = document.getElementById('lbCommentName');
    const lbCommentBody   = document.getElementById('lbCommentBody');
    let socialPath = null;   // Pfad des aktuell angezeigten Bildes

    lbCommentName.value = localStorage.getItem('gallery-comment-name') || '';

    function setLikeUI(liked, count) {
      lbLike.classList.toggle('liked', liked);
      lbLike.setAttribute('aria-pressed', liked ? 'true' : 'false');
      lbLikeCount.textContent = count;
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
           + ' · ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    async function refreshSocial(path) {
      socialPath = path;
      setLikeUI(false, '·');
      lbCommentCount.textContent = '·';
      lbCommentsList.innerHTML = '';
      if (!path) return;

      const [likeRes, commentRes] = await Promise.all([
        db.from('image_likes').select('client_id').eq('image_path', path),
        db.from('image_comments').select('*').eq('image_path', path).order('created_at', { ascending: true }),
      ]);

      // Antwort eines zwischenzeitlich gewechselten Bildes ignorieren
      if (socialPath !== path) return;

      const likeRows = likeRes.data || [];
      setLikeUI(likeRows.some(r => r.client_id === CLIENT_ID), likeRows.length);

      renderComments(commentRes.data || []);
    }

    function renderComments(rows) {
      lbCommentCount.textContent = rows.length;
      lbCommentsList.innerHTML = '';
      if (!rows.length) {
        const p = document.createElement('p');
        p.className = 'lb__comment-empty';
        p.textContent = 'Noch keine Kommentare – schreib den ersten!';
        lbCommentsList.appendChild(p);
        return;
      }
      for (const c of rows) {
        const wrap = document.createElement('div');
        wrap.className = 'lb__comment';

        const head = document.createElement('div');
        head.className = 'lb__comment-head';
        const author = document.createElement('span');
        author.className = 'lb__comment-author';
        author.textContent = c.author || 'Anonym';
        const time = document.createElement('span');
        time.className = 'lb__comment-time';
        time.textContent = fmtTime(c.created_at);
        head.appendChild(author);
        head.appendChild(time);

        if (c.client_id && c.client_id === CLIENT_ID) {
          const del = document.createElement('button');
          del.className = 'lb__comment-del';
          del.type = 'button';
          del.textContent = 'Löschen';
          del.addEventListener('click', () => deleteComment(c.id, c.image_path));
          head.appendChild(del);
        }

        const body = document.createElement('div');
        body.className = 'lb__comment-body';
        body.textContent = c.body;

        wrap.appendChild(head);
        wrap.appendChild(body);
        lbCommentsList.appendChild(wrap);
      }
    }

    lbLike.addEventListener('click', async () => {
      if (!socialPath) return;
      const path = socialPath;
      const wasLiked = lbLike.classList.contains('liked');
      const cur = parseInt(lbLikeCount.textContent, 10) || 0;
      // Optimistisches UI
      setLikeUI(!wasLiked, wasLiked ? Math.max(0, cur - 1) : cur + 1);
      try {
        if (wasLiked) {
          await db.from('image_likes').delete().eq('image_path', path).eq('client_id', CLIENT_ID);
        } else {
          await db.from('image_likes').upsert({ image_path: path, client_id: CLIENT_ID });
        }
      } catch (_) { /* bei Fehler gleicht refreshSocial wieder ab */ }
      if (socialPath === path) {
        const { data } = await db.from('image_likes').select('client_id').eq('image_path', path);
        const rows = data || [];
        setLikeUI(rows.some(r => r.client_id === CLIENT_ID), rows.length);
      }
    });

    lbCommentToggle.addEventListener('click', () => {
      lbComments.hidden = !lbComments.hidden;
      if (!lbComments.hidden) lbCommentBody.focus();
    });

    async function deleteComment(id, path) {
      const ok = await showConfirm('Kommentar löschen', 'Diesen Kommentar wirklich löschen?');
      if (!ok) return;
      await db.from('image_comments').delete().eq('id', id);
      if (socialPath === path) refreshSocial(path);
    }

    lbCommentForm.addEventListener('submit', async e => {
      e.preventDefault();
      const path = socialPath;
      const body = lbCommentBody.value.trim();
      if (!path || !body) return;
      const author = lbCommentName.value.trim() || 'Anonym';
      localStorage.setItem('gallery-comment-name', lbCommentName.value.trim());

      const submitBtn = lbCommentForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      const { error } = await db.from('image_comments').insert({
        image_path: path, author, body, client_id: CLIENT_ID,
      });
      submitBtn.disabled = false;
      if (error) { setStatus('Kommentar konnte nicht gespeichert werden', 'error'); return; }
      lbCommentBody.value = '';
      if (socialPath === path) refreshSocial(path);
    });

    // ── Password Protection ──
    // To change the password:
    //   1. Run in browser console: crypto.subtle.digest('SHA-256', new TextEncoder().encode('IhrPasswort')).then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
    //   2. Replace PW_HASH below with the printed value.
    const PW_HASH    = '0c78845b26a28951c473b4dfc9c1a5305a657db1b2b4481de86a2dcec564fdcd'; // SmartStudio
    const PW_SESSION = 'gallery-auth-v1';
    const pwScreen   = document.getElementById('pwScreen');
    const pwInput    = document.getElementById('pwInput');
    const pwSubmit   = document.getElementById('pwSubmit');
    const pwError    = document.getElementById('pwError');

    async function hashString(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    async function tryUnlock() {
      pwError.textContent = '';
      pwSubmit.disabled = true;
      const hash = await hashString(pwInput.value);
      if (hash === PW_HASH) {
        sessionStorage.setItem(PW_SESSION, '1');
        pwScreen.classList.add('fade-out');
        setTimeout(() => pwScreen.remove(), 420);
      } else {
        pwError.textContent = 'Falsches Passwort';
        pwInput.value = '';
        pwInput.focus();
      }
      pwSubmit.disabled = false;
    }

    pwSubmit.addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

    if (sessionStorage.getItem(PW_SESSION)) {
      pwScreen.remove();
    }

    // ── Bestehende Alben optimieren ──
    // Erzeugt fehlende thumbs/display-Versionen für alle bereits hochgeladenen
    // Bilder. Einmalig nötig für Alben, die vor dieser Funktion entstanden sind.
    const optimizeBtn = document.getElementById('optimizeBtn');
    optimizeBtn.addEventListener('click', async () => {
      optimizeBtn.disabled = true;
      optimizeBtn.textContent = 'Prüfe…';
      try {
        const { data, error } = await db.storage.from(BUCKET).list('', { limit: 200 });
        if (error) { setStatus('Fehler: ' + error.message, 'error'); return; }
        const folders = (data || []).filter(e => e && e.name && e.id === null).map(e => e.name);

        const tasks = [];
        for (const folder of folders) {
          const items  = await listAllInFolder(folder);
          const photos = items.filter(f => f.name && f.name !== '_meta.json' && f.id);
          const thumbs   = new Set((await listAllInFolder(`${folder}/${THUMB_DIR}`)).map(f => f.name));
          const displays = new Set((await listAllInFolder(`${folder}/${DISPLAY_DIR}`)).map(f => f.name));
          for (const p of photos) {
            if (!thumbs.has(`${p.name}.jpg`) || !displays.has(`${p.name}.jpg`)) {
              tasks.push({ folder, name: p.name });
            }
          }
        }

        if (!tasks.length) {
          setStatus('Alle Bilder sind bereits optimiert ✓', 'ok');
          return;
        }

        const confirmed = await showConfirm(
          'Bilder optimieren',
          `Für ${tasks.length} Bild${tasks.length > 1 ? 'er' : ''} werden verkleinerte Vorschau-Versionen erzeugt. ` +
          `Das kann einige Minuten dauern — bitte den Tab geöffnet lassen.`,
          'Optimieren'
        );
        if (!confirmed) return;

        let done = 0, failed = 0;
        const queue = [...tasks];
        const tick = () => { optimizeBtn.textContent = `Optimiere… ${done + failed}/${tasks.length}`; };
        tick();
        // 3 Bilder parallel: schnell genug, ohne Browser/Verbindung zu überlasten
        await Promise.all(Array.from({ length: 3 }, async () => {
          while (queue.length) {
            const t = queue.shift();
            try {
              const { data: blob, error: dlErr } = await db.storage.from(BUCKET).download(`${t.folder}/${t.name}`);
              if (dlErr || !blob) throw dlErr || new Error('Download fehlgeschlagen');
              const okDerived = await uploadDerived(t.folder, t.name, blob);
              if (okDerived) done++; else failed++;
            } catch (e) {
              failed++;
              console.error('Optimierung fehlgeschlagen:', t.folder, t.name, e);
            }
            tick();
          }
        }));

        if (failed === 0) setStatus(`${done} Bild${done > 1 ? 'er' : ''} optimiert ✓`, 'ok');
        else              setStatus(`${done} optimiert, ${failed} fehlgeschlagen`, 'error');
        await loadFolders();
      } finally {
        optimizeBtn.disabled = false;
        optimizeBtn.textContent = 'Bilder optimieren';
      }
    });

    // ── Init ──
    loadFolders();
  </script>
</body>
</html>
